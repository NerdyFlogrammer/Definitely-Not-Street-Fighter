// Scale canvas to fit window
function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// AUDIO ENGINE (Web Audio API chiptune)
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Play a tone
function playTone(freq, duration, type = 'square', vol = 0.15, detune = 0) {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  o.detune.value = detune;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + duration);
}

// Noise burst for hits
function playNoise(duration, vol = 0.2) {
  ensureAudio();
  const bufSize = audioCtx.sampleRate * duration;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  src.buffer = buf;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  src.connect(g); g.connect(audioCtx.destination);
  src.start();
}

// Music system
let musicInterval = null;
let musicPlaying = false;

function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
  musicPlaying = false;
}

function playMenuMusic() {
  stopMusic();
  musicPlaying = true;
  const melody = [262, 330, 392, 330, 262, 220, 262, 330, 392, 523, 440, 392, 330, 262, 220, 196];
  let i = 0;
  const play = () => {
    if (!musicPlaying) return;
    playTone(melody[i % melody.length], 0.2, 'square', 0.08);
    playTone(melody[i % melody.length] / 2, 0.2, 'triangle', 0.05);
    i++;
  };
  play();
  musicInterval = setInterval(play, 280);
}

function playFightMusic() {
  stopMusic();
  musicPlaying = true;
  const bass = [130, 130, 165, 165, 196, 196, 165, 165, 130, 130, 110, 110, 130, 130, 165, 196];
  const lead = [523, 494, 440, 392, 440, 494, 523, 587, 523, 494, 440, 392, 330, 392, 440, 523];
  let i = 0;
  const play = () => {
    if (!musicPlaying) return;
    playTone(bass[i % bass.length], 0.15, 'triangle', 0.06);
    if (i % 2 === 0) playTone(lead[Math.floor(i/2) % lead.length], 0.12, 'square', 0.05);
    i++;
  };
  play();
  musicInterval = setInterval(play, 200);
}

// ============================================================
// PIXEL ART SPRITE SYSTEM
// ============================================================

function createSprite(w, h, drawFn) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const cx = c.getContext('2d');
  drawFn(cx, w, h);
  return c;
}

function px(cx, x, y, color, size = 1) {
  cx.fillStyle = color;
  cx.fillRect(x, y, size, size);
}

function pxRect(cx, x, y, w, h, color) {
  cx.fillStyle = color;
  cx.fillRect(x, y, w, h);
}

// ============================================================
// SPRITE DRAWING FUNCTIONS
// ============================================================

function drawCharSprite(charDef, pose, frame, facing) {
  const S = 64;
  return createSprite(S, S, (cx) => {
    const c = charDef.colors;
    const f = facing === 'right' ? 1 : -1;
    const bob = Math.sin(frame * 0.15) * 2;

    if (facing === 'left') {
      cx.translate(S, 0);
      cx.scale(-1, 1);
    }

    const drawBody = (headY, bodyY, legSpread, armPose) => {
      pxRect(cx, 22, bodyY + 16, 6, 14, c.body);
      pxRect(cx, 36, bodyY + 16, 6, 14, c.body);
      pxRect(cx, 20, bodyY + 28, 8, 4, '#333');
      pxRect(cx, 34, bodyY + 28, 8, 4, '#333');
      pxRect(cx, 20, bodyY, 24, 18, c.body);
      pxRect(cx, 20, bodyY + 14, 24, 3, c.belt);
      pxRect(cx, 20, bodyY + 4, 24, 2, c.accent);
      pxRect(cx, 24, headY, 16, 16, c.skin);
      pxRect(cx, 23, headY - 2, 18, 6, c.hair);
      pxRect(cx, 28, headY + 6, 3, 3, '#fff');
      pxRect(cx, 35, headY + 6, 3, 3, '#fff');
      pxRect(cx, 29, headY + 7, 2, 2, c.eyes);
      pxRect(cx, 36, headY + 7, 2, 2, c.eyes);
    };

    switch(pose) {
      case 'idle': {
        const b = Math.floor(bob);
        drawBody(12 + b, 28 + b, 0);
        pxRect(cx, 14, 30 + b, 6, 12, c.skin);
        pxRect(cx, 44, 30 + b, 6, 12, c.skin);
        pxRect(cx, 14, 40 + b, 6, 4, c.skin);
        pxRect(cx, 44, 40 + b, 6, 4, c.skin);
        break;
      }
      case 'walk': {
        const step = Math.sin(frame * 0.3) * 4;
        drawBody(12, 28, 0);
        pxRect(cx, 22, 44 + step, 6, 14, c.body);
        pxRect(cx, 36, 44 - step, 6, 14, c.body);
        pxRect(cx, 20, 56 + step, 8, 4, '#333');
        pxRect(cx, 34, 56 - step, 8, 4, '#333');
        pxRect(cx, 14, 30 - step, 6, 12, c.skin);
        pxRect(cx, 44, 30 + step, 6, 12, c.skin);
        break;
      }
      case 'punch': {
        drawBody(12, 28, 0);
        pxRect(cx, 44, 30, 18, 6, c.skin);
        pxRect(cx, 58, 28, 6, 8, c.skin);
        if (frame % 4 < 2) {
          pxRect(cx, 60, 26, 4, 4, '#ff0');
          pxRect(cx, 58, 24, 3, 3, '#f80');
        }
        pxRect(cx, 14, 32, 6, 10, c.skin);
        break;
      }
      case 'kick': {
        drawBody(10, 26, 0);
        pxRect(cx, 44, 44, 16, 6, c.body);
        pxRect(cx, 56, 42, 8, 8, '#333');
        if (frame % 4 < 2) {
          pxRect(cx, 60, 40, 4, 4, '#ff0');
        }
        pxRect(cx, 16, 28, 6, 10, c.skin);
        pxRect(cx, 42, 28, 6, 10, c.skin);
        break;
      }
      case 'special': {
        drawBody(10, 26, 0);
        pxRect(cx, 44, 28, 12, 6, c.skin);
        pxRect(cx, 14, 28, 6, 10, c.skin);
        const r = 6 + Math.sin(frame * 0.5) * 2;
        cx.fillStyle = c.accent;
        cx.beginPath();
        cx.arc(62, 32, r, 0, Math.PI * 2);
        cx.fill();
        cx.fillStyle = '#fff';
        cx.beginPath();
        cx.arc(62, 32, r * 0.5, 0, Math.PI * 2);
        cx.fill();
        if (frame % 3 === 0) {
          pxRect(cx, 56 + Math.random()*12, 26 + Math.random()*12, 2, 2, '#fff');
        }
        break;
      }
      case 'block': {
        drawBody(14, 30, 0);
        pxRect(cx, 26, 30, 6, 14, c.skin);
        pxRect(cx, 32, 30, 6, 14, c.skin);
        if (frame % 6 < 3) {
          cx.globalAlpha = 0.3;
          pxRect(cx, 22, 28, 20, 18, '#88ccff');
          cx.globalAlpha = 1;
        }
        break;
      }
      case 'hit': {
        drawBody(14, 30, 0);
        pxRect(cx, 10, 32, 6, 10, c.skin);
        pxRect(cx, 44, 34, 6, 10, c.skin);
        pxRect(cx, 30, 10, 3, 3, '#ff0');
        pxRect(cx, 38, 8, 2, 2, '#f80');
        pxRect(cx, 24, 12, 2, 2, '#ff0');
        break;
      }
      case 'ko': {
        pxRect(cx, 8, 48, 16, 12, c.skin);
        pxRect(cx, 6, 46, 18, 5, c.hair);
        pxRect(cx, 12, 52, 2, 2, '#f00');
        pxRect(cx, 14, 54, 2, 2, '#f00');
        pxRect(cx, 14, 52, 2, 2, '#f00');
        pxRect(cx, 12, 54, 2, 2, '#f00');
        pxRect(cx, 19, 52, 2, 2, '#f00');
        pxRect(cx, 21, 54, 2, 2, '#f00');
        pxRect(cx, 21, 52, 2, 2, '#f00');
        pxRect(cx, 19, 54, 2, 2, '#f00');
        pxRect(cx, 22, 46, 28, 12, c.body);
        pxRect(cx, 22, 54, 28, 3, c.belt);
        pxRect(cx, 48, 46, 14, 8, c.body);
        pxRect(cx, 58, 46, 4, 8, '#333');
        const starAngle = frame * 0.1;
        for (let s = 0; s < 3; s++) {
          const sx = 16 + Math.cos(starAngle + s * 2.1) * 12;
          const sy = 42 + Math.sin(starAngle + s * 2.1) * 5;
          pxRect(cx, sx, sy, 3, 3, '#ff0');
        }
        break;
      }
    }

    if (charDef.id === 'ninja' && pose !== 'ko') {
      pxRect(cx, 24, 38 + (pose==='idle'?Math.floor(bob):0) + (pose==='hit'?2:0) + 6, 16, 4, '#333');
      pxRect(cx, 18, 12 + (pose==='idle'?Math.floor(bob):0), 6, 2, '#cc2222');
    }
    if (charDef.id === 'brawler' && pose !== 'ko') {
      const by = pose==='idle'?Math.floor(bob):0;
      if (pose === 'idle' || pose === 'walk') {
        pxRect(cx, 12, 30+by, 8, 14, c.skin);
        pxRect(cx, 44, 30+by, 8, 14, c.skin);
      }
      if (frame % 10 < 3) {
        pxRect(cx, 30, (pose==='idle'?42+Math.floor(bob):42), 4, 2, '#ff0');
      }
    }
    if (charDef.id === 'monk' && pose !== 'ko') {
      const by = pose==='idle'?Math.floor(bob):0;
      for (let b = 0; b < 5; b++) {
        pxRect(cx, 22 + b*4, 28+by, 2, 2, '#884400');
      }
    }
    if (charDef.id === 'hacker' && pose !== 'ko') {
      const by = pose==='idle'?Math.floor(bob):0;
      pxRect(cx, 26, 18+by, 14, 3, '#00ff88');
      if (frame % 4 === 0 && (pose === 'special' || pose === 'idle')) {
        pxRect(cx, 20+Math.random()*24, 26+by+Math.random()*20, 2, 2, '#00ff88');
      }
    }
  });
}

      cx.fillStyle = '#0a0a2a';
      cx.beginPath(); cx.arc(108, 46, 22, 0, Math.PI*2); cx.fill();
      pxRect(cx, 130, h*0.2, 252, h*0.6, '#3a2a4a');
      for (let t = 0; t < 3; t++) {
        const tw = 280 - t * 40;
        const tx = 116 + t * 20;
        const ty = h*0.2 - t * 30;
        cx.fillStyle = '#2a1a3a';
        cx.beginPath();
        cx.moveTo(tx, ty + 30); cx.lineTo(tx + tw/2, ty); cx.lineTo(tx + tw, ty + 30);
        cx.closePath(); cx.fill();
        pxRect(cx, tx, ty + 28, tw, 3, '#5a3a6a');
      }
      pxRect(cx, 226, h*0.5, 60, h*0.3, '#1a0a2a');
      pxRect(cx, 224, h*0.48, 64, 4, '#aa8800');
      for (let i = 0; i < 2; i++) {
        pxRect(cx, 150 + i * 200, h*0.2, 14, h*0.6, '#5a3a6a');
      }
      for (let i = 0; i < 15; i++) {
        const px2 = (i * 67 + Math.sin(frame * 0.02 + i) * 30 + frame * 0.3) % w;
        const py = (i * 43 + Math.cos(frame * 0.015 + i) * 20) % (h * 0.7);
        const alpha = 0.3 + Math.sin(frame * 0.05 + i) * 0.3;
        cx.globalAlpha = alpha;
        pxRect(cx, px2, py, 2, 2, i % 3 === 0 ? '#ff88ff' : '#88ffff');
      }
      cx.globalAlpha = 1;
      pxRect(cx, 0, h*0.75, w, h*0.25, '#2a1a1a');
      for (let i = 0; i < 12; i++) {
        pxRect(cx, i * 44 + 5, h*0.78, 36, 8, '#3a2a2a');
        pxRect(cx, i * 44 + 5, h*0.78, 36, 1, '#4a3a3a');
      }
      for (let i = 0; i < 3; i++) {
        const sx = 210 + i * 50;
        for (let s = 0; s < 4; s++) {
          const sy = h*0.5 - s * 12 - (frame * 0.5 % 20);
          cx.globalAlpha = 0.2 - s * 0.04;
          pxRect(cx, sx + Math.sin(frame*0.03+s)*4, sy, 4, 4, '#aaa');
        }
      }
      cx.globalAlpha = 1;
    }
  }
];

// ============================================================
// GAMEPAD SYSTEM (HTML5 Gamepad API)
// ============================================================

// Xbox controller mapping (Standard Gamepad):
// Buttons: 0=A, 1=B, 2=X, 3=Y, 4=LB, 5=RB, 6=LT, 7=RT, 8=Back, 9=Start,
//          10=LS, 11=RS, 12=DUp, 13=DDown, 14=DLeft, 15=DRight
// Axes: 0=LS-X, 1=LS-Y, 2=RS-X, 3=RS-Y

const gamepadStates = [null, null]; // Processed button states per player
const prevGamepadButtons = [[], []];
const connectedGamepads = [false, false];

// Gamepad button mapping per player:
// D-pad: movement, A(0)/X(2): punch/kick, B(1): special, LB(4)/RB(5): block
const GP_MAP = {
  dpadUp: 12, dpadDown: 13, dpadLeft: 14, dpadRight: 15,
  a: 0, x: 2, b: 1, y: 3,
  lb: 4, rb: 5, lt: 6, rt: 7,
  start: 9, back: 8
};

const AXIS_DEADZONE = 0.4;

function pollGamepads() {
  const rawPads = navigator.getGamepads ? navigator.getGamepads() : [];
  let padIdx = 0;
  for (let i = 0; i < rawPads.length && padIdx < 2; i++) {
    const gp = rawPads[i];
    if (!gp) continue;
    connectedGamepads[padIdx] = true;

    const prev = prevGamepadButtons[padIdx] || [];
    const btns = {};
    const justPressed = {};

    // Buttons
    for (let b = 0; b < gp.buttons.length; b++) {
      btns[b] = gp.buttons[b].pressed;
      justPressed[b] = gp.buttons[b].pressed && !prev[b];
    }

    // Axes → virtual d-pad
    const lsX = gp.axes[0] || 0;
    const lsY = gp.axes[1] || 0;
    if (lsX < -AXIS_DEADZONE) { btns[GP_MAP.dpadLeft] = true; if (!prev[GP_MAP.dpadLeft]) justPressed[GP_MAP.dpadLeft] = true; }
    if (lsX > AXIS_DEADZONE)  { btns[GP_MAP.dpadRight] = true; if (!prev[GP_MAP.dpadRight]) justPressed[GP_MAP.dpadRight] = true; }
    if (lsY < -AXIS_DEADZONE) { btns[GP_MAP.dpadUp] = true; if (!prev[GP_MAP.dpadUp]) justPressed[GP_MAP.dpadUp] = true; }
    if (lsY > AXIS_DEADZONE)  { btns[GP_MAP.dpadDown] = true; if (!prev[GP_MAP.dpadDown]) justPressed[GP_MAP.dpadDown] = true; }

    // Save for next frame diff
    const savePrev = [];
    for (let b = 0; b < 20; b++) savePrev[b] = btns[b] || false;
    // Also include virtual d-pad from axes
    savePrev[GP_MAP.dpadLeft] = btns[GP_MAP.dpadLeft] || false;
    savePrev[GP_MAP.dpadRight] = btns[GP_MAP.dpadRight] || false;
    savePrev[GP_MAP.dpadUp] = btns[GP_MAP.dpadUp] || false;
    savePrev[GP_MAP.dpadDown] = btns[GP_MAP.dpadDown] || false;
    prevGamepadButtons[padIdx] = savePrev;

    gamepadStates[padIdx] = { btns, justPressed };
    padIdx++;
  }
  // Mark disconnected
  for (let i = padIdx; i < 2; i++) {
    connectedGamepads[i] = false;
    gamepadStates[i] = null;
  }
}

// Map gamepad to virtual key presses for a player
// Returns object of control keys currently "held" and "justPressed"
function getGamepadInput(playerIdx) {
  const gp = gamepadStates[playerIdx];
  if (!gp) return null;
  return {
    left: gp.btns[GP_MAP.dpadLeft] || false,
    right: gp.btns[GP_MAP.dpadRight] || false,
    up: gp.btns[GP_MAP.dpadUp] || false,
    down: gp.btns[GP_MAP.dpadDown] || false,
    punch: gp.justPressed[GP_MAP.a] || false,        // A = punch
    kick: gp.justPressed[GP_MAP.x] || false,          // X = kick
    special: gp.justPressed[GP_MAP.b] || false,        // B = special
    block: gp.btns[GP_MAP.lb] || gp.btns[GP_MAP.rb] || false, // LB/RB = block (hold)
    confirm: gp.justPressed[GP_MAP.a] || gp.justPressed[GP_MAP.start] || false,
    menuLeft: gp.justPressed[GP_MAP.dpadLeft] || false,
    menuRight: gp.justPressed[GP_MAP.dpadRight] || false,
    menuUp: gp.justPressed[GP_MAP.dpadUp] || false,
    menuDown: gp.justPressed[GP_MAP.dpadDown] || false,
    start: gp.justPressed[GP_MAP.start] || false,
    back: gp.justPressed[GP_MAP.back] || false,
  };
}

// ============================================================
// AI OPPONENT SYSTEM
// ============================================================

const AI = {
  // Internal state for the AI
  thinkTimer: 0,
  currentAction: null, // { type: 'approach'|'attack'|'block'|'retreat'|'idle', duration: N }
  actionTimer: 0,
  reactionBuffer: 0, // frames before AI reacts to opponent's action
  lastOpponentState: 'idle',
  comboStep: 0,
  comboTimer: 0,

  // Difficulty profiles
  profiles: {
    easy: {
      reactionDelay: 25,     // Slow reactions (frames)
      blockChance: 0.08,     // Rarely blocks
      attackRate: 0.015,     // Infrequent attacks
      specialRate: 0.004,    // Rarely uses special
      approachSpeed: 0.5,    // Slow approach
      retreatChance: 0.05,   // Rarely retreats
      punishChance: 0.05,    // Almost never punishes
      comboChance: 0,        // No combos
      optimalRange: false,   // Doesn't seek optimal range
      thinkInterval: 30,     // Thinks slowly
      wanderChance: 0.3,     // Often wanders randomly
    },
    medium: {
      reactionDelay: 12,
      blockChance: 0.3,
      attackRate: 0.04,
      specialRate: 0.012,
      approachSpeed: 0.8,
      retreatChance: 0.15,
      punishChance: 0.35,
      comboChance: 0.2,
      optimalRange: true,
      thinkInterval: 15,
      wanderChance: 0.1,
    },
    hard: {
      reactionDelay: 4,
      blockChance: 0.6,
      attackRate: 0.07,
      specialRate: 0.025,
      approachSpeed: 1.0,
      retreatChance: 0.25,
      punishChance: 0.75,
      comboChance: 0.5,
      optimalRange: true,
      thinkInterval: 6,
      wanderChance: 0.02,
    }
  },

  getProfile() {
    const names = ['easy', 'medium', 'hard'];
    return this.profiles[names[cpuDifficulty]] || this.profiles.medium;
  },

  reset() {
    this.thinkTimer = 0;
    this.currentAction = null;
    this.actionTimer = 0;
    this.reactionBuffer = 0;
    this.lastOpponentState = 'idle';
    this.comboStep = 0;
    this.comboTimer = 0;
  },

  // Returns virtual control inputs for the CPU player
  update(cpuPlayer, humanPlayer) {
    const prof = this.getProfile();
    const input = { left: false, right: false, up: false, down: false, punch: false, kick: false, special: false, block: false };

    // Can't act if in hitstun/blockstun/attacking/KO
    if (cpuPlayer.hitstun > 0 || cpuPlayer.blockstun > 0 || cpuPlayer.state === 'ko') return input;
    if (cpuPlayer.state === 'punch' || cpuPlayer.state === 'kick' || cpuPlayer.state === 'special') return input;

    const dist = Math.abs(cpuPlayer.x - humanPlayer.x);
    const cpuIsLeft = cpuPlayer.x < humanPlayer.x;
    const attackRange = 65; // Close enough to hit
    const specialRange = 120;

    // Detect opponent state changes for reaction
    if (humanPlayer.state !== this.lastOpponentState) {
      this.reactionBuffer = prof.reactionDelay;
      this.lastOpponentState = humanPlayer.state;
    }
    if (this.reactionBuffer > 0) this.reactionBuffer--;

    // Combo system
    if (this.comboTimer > 0) {
      this.comboTimer--;
      if (this.comboTimer <= 0) this.comboStep = 0;
    }

    // Think timer - AI makes decisions at intervals
    this.thinkTimer--;
    if (this.thinkTimer <= 0) {
      this.thinkTimer = prof.thinkInterval + Math.floor(Math.random() * 8);
      this.decideAction(cpuPlayer, humanPlayer, prof, dist, attackRange, cpuIsLeft);
    }

    // Execute current action
    if (this.currentAction) {
      this.actionTimer--;

      switch(this.currentAction.type) {
        case 'approach':
          if (cpuIsLeft) input.right = true;
          else input.left = true;
          // Attack when in range
          if (dist < attackRange && cpuPlayer.cooldown <= 0) {
            if (Math.random() < prof.attackRate * 3) {
              this.pickAttack(input, cpuPlayer, prof, dist, specialRange);
            }
          }
          break;

        case 'retreat':
          if (cpuIsLeft) input.left = true;
          else input.right = true;
          break;

        case 'attack':
          this.pickAttack(input, cpuPlayer, prof, dist, specialRange);
          this.currentAction = null; // One-shot
          break;

        case 'block':
          input.block = true;
          break;

        case 'wander':
          if (this.currentAction.dir === 'left') input.left = true;
          else if (this.currentAction.dir === 'right') input.right = true;
          break;

        case 'idle':
          // Do nothing, just stand
          break;
      }

      if (this.actionTimer <= 0) this.currentAction = null;
    }

    // Reactive blocking — react to incoming attacks (overrides current action)
    if (this.reactionBuffer <= 0) {
      const opAttacking = humanPlayer.state === 'punch' || humanPlayer.state === 'kick' || humanPlayer.state === 'special';
      if (opAttacking && dist < attackRange + 20 && Math.random() < prof.blockChance) {
        input.block = true;
        input.left = false;
        input.right = false;
        input.punch = false;
        input.kick = false;
        input.special = false;
      }

      // Punish on recovery — if opponent just finished attacking and is close
      if ((humanPlayer.state === 'idle' && this.lastOpponentState !== 'idle' &&
          (this.lastOpponentState === 'punch' || this.lastOpponentState === 'kick' || this.lastOpponentState === 'special')) &&
          dist < attackRange && Math.random() < prof.punishChance && cpuPlayer.cooldown <= 0) {
        input.block = false;
        this.pickAttack(input, cpuPlayer, prof, dist, specialRange);
      }
    }

    return input;
  },

  decideAction(cpuPlayer, humanPlayer, prof, dist, attackRange, cpuIsLeft) {
    const rand = Math.random();

    // Wander randomly (more on easy)
    if (rand < prof.wanderChance) {
      const dirs = ['left', 'right', 'none'];
      this.currentAction = { type: 'wander', dir: dirs[Math.floor(Math.random() * 3)] };
      this.actionTimer = 20 + Math.floor(Math.random() * 30);
      return;
    }

    // If opponent is attacking, consider blocking
    const opAttacking = humanPlayer.state === 'punch' || humanPlayer.state === 'kick' || humanPlayer.state === 'special';
    if (opAttacking && dist < attackRange + 30 && Math.random() < prof.blockChance * 2) {
      this.currentAction = { type: 'block' };
      this.actionTimer = 15 + Math.floor(Math.random() * 10);
      return;
    }

    // Optimal range seeking (medium/hard)
    if (prof.optimalRange) {
      const optDist = 55; // Sweet spot for attacks
      if (dist > optDist + 30) {
        this.currentAction = { type: 'approach' };
        this.actionTimer = 20 + Math.floor(Math.random() * 15);
        return;
      }
      if (dist < 35 && Math.random() < prof.retreatChance * 2) {
        this.currentAction = { type: 'retreat' };
        this.actionTimer = 10 + Math.floor(Math.random() * 10);
        return;
      }
    }

    // In attack range
    if (dist < attackRange) {
      if (Math.random() < prof.attackRate * 10) {
        this.currentAction = { type: 'attack' };
        this.actionTimer = 5;
        return;
      }
      if (Math.random() < prof.retreatChance) {
        this.currentAction = { type: 'retreat' };
        this.actionTimer = 15 + Math.floor(Math.random() * 15);
        return;
      }
      // Idle/feint
      this.currentAction = { type: 'idle' };
      this.actionTimer = 10 + Math.floor(Math.random() * 15);
    } else {
      // Out of range - approach
      if (Math.random() < 0.7) {
        this.currentAction = { type: 'approach' };
        this.actionTimer = 15 + Math.floor(Math.random() * 20);
      } else {
        this.currentAction = { type: 'idle' };
        this.actionTimer = 10 + Math.floor(Math.random() * 20);
      }
    }
  },

  pickAttack(input, cpuPlayer, prof, dist, specialRange) {
    if (cpuPlayer.cooldown > 0) return;

    // Combo system for medium/hard
    if (prof.comboChance > 0 && this.comboStep > 0 && this.comboTimer > 0) {
      // Continue combo
      if (this.comboStep === 1) {
        input.kick = true;
        this.comboStep = 2;
        this.comboTimer = 20;
      } else if (this.comboStep === 2 && cpuPlayer.specialCooldown <= 0) {
        input.special = true;
        this.comboStep = 0;
        this.comboTimer = 0;
      } else {
        input.punch = true;
        this.comboStep = 0;
      }
      return;
    }

    // Start a combo?
    if (Math.random() < prof.comboChance && dist < 65) {
      input.punch = true;
      this.comboStep = 1;
      this.comboTimer = 25;
      return;
    }

    // Special attack when available and in range
    if (cpuPlayer.specialCooldown <= 0 && Math.random() < prof.specialRate * 15 && dist < specialRange) {
      input.special = true;
      return;
    }

    // Random punch or kick
    if (Math.random() < 0.55) {
      input.punch = true;
    } else {
      input.kick = true;
    }
  }
};

let charSelectCooldown = [0, 0];

function updateCharSelect() {
  const gp0 = getGamepadInput(0);
  const gp1 = getGamepadInput(1);

  // P1 selection (WASD + Gamepad 0)
  if (!players[0].confirmed) {
    if (charSelectCooldown[0] <= 0) {
      const gpLeft = gp0 && gp0.menuLeft;
      const gpRight = gp0 && gp0.menuRight;
      const gpUp = gp0 && gp0.menuUp;
      const gpDown = gp0 && gp0.menuDown;

      if (keys['KeyA'] || keys['KeyD'] || gpLeft || gpRight) {
        const dir = (keys['KeyD'] || gpRight) ? 1 : -1;
        players[0].charIdx = (players[0].charIdx + dir + 4) % 4;
        charSelectCooldown[0] = 12;
        SFX.menuMove();
      }
      if (keys['KeyW'] || keys['KeyS'] || gpUp || gpDown) {
        selectedStage = (selectedStage + ((keys['KeyS'] || gpDown) ? 1 : -1) + 4) % 4;
        charSelectCooldown[0] = 12;
        SFX.menuMove();
      }
    }
    if (keys['KeyF'] || keys['KeyG'] || (gp0 && gp0.confirm)) {
      players[0].confirmed = true;
      SFX.select();
      keys['KeyF'] = false; keys['KeyG'] = false;
    }
  }

  // P2 selection (Arrows + Gamepad 1)
  if (!players[1].confirmed) {
    if (charSelectCooldown[1] <= 0) {
      const gpLeft = gp1 && gp1.menuLeft;
      const gpRight = gp1 && gp1.menuRight;
      const gpUp = gp1 && gp1.menuUp;
      const gpDown = gp1 && gp1.menuDown;

      if (keys['ArrowLeft'] || keys['ArrowRight'] || gpLeft || gpRight) {
        const dir = (keys['ArrowRight'] || gpRight) ? 1 : -1;
        players[1].charIdx = (players[1].charIdx + dir + 4) % 4;
        charSelectCooldown[1] = 12;
        SFX.menuMove();
      }
      if (keys['ArrowUp'] || keys['ArrowDown'] || gpUp || gpDown) {
        selectedStage = (selectedStage + ((keys['ArrowDown'] || gpDown) ? 1 : -1) + 4) % 4;
        charSelectCooldown[1] = 12;
        SFX.menuMove();
      }
    }
    if (keys['KeyK'] || keys['KeyL'] || (gp1 && gp1.confirm)) {
      players[1].confirmed = true;
      SFX.select();
      keys['KeyK'] = false; keys['KeyL'] = false;
    }
  }

  charSelectCooldown[0] = Math.max(0, charSelectCooldown[0] - 1);
  charSelectCooldown[1] = Math.max(0, charSelectCooldown[1] - 1);

  // Both confirmed - go to mode select
  if (players[0].confirmed && players[1].confirmed) {
    gameState = 'modeSelect';
    modeSelectIdx = 0;
    diffSelectIdx = 1;
    modeSelectPhase = 0;
    modeSelectCooldown = 15;
  }
}

function updateModeSelect() {
  if (modeSelectCooldown > 0) { modeSelectCooldown--; return; }

  const gp0 = getGamepadInput(0);
  const gp1 = getGamepadInput(1);

  const anyConfirm = keys['Enter'] || keys['Space'] || keys['KeyF'] || keys['KeyG'] || keys['KeyK'] || keys['KeyL']
    || (gp0 && gp0.confirm) || (gp1 && gp1.confirm);
  const anyLeft = keys['KeyA'] || keys['ArrowLeft'] || (gp0 && gp0.menuLeft) || (gp1 && gp1.menuLeft);
  const anyRight = keys['KeyD'] || keys['ArrowRight'] || (gp0 && gp0.menuRight) || (gp1 && gp1.menuRight);
  const anyBack = keys['Escape'] || (gp0 && gp0.back) || (gp1 && gp1.back);

  if (modeSelectPhase === 0) {
    // Selecting mode: VS PLAYER or VS CPU
    if (anyLeft || anyRight) {
      modeSelectIdx = modeSelectIdx === 0 ? 1 : 0;
      modeSelectCooldown = 12;
      SFX.menuMove();
      // Clear keys
      keys['KeyA'] = false; keys['KeyD'] = false;
      keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
    }

    if (anyConfirm) {
      SFX.select();
      keys['Enter'] = false; keys['Space'] = false;
      keys['KeyF'] = false; keys['KeyG'] = false;
      keys['KeyK'] = false; keys['KeyL'] = false;
      if (modeSelectIdx === 0) {
        // VS PLAYER
        gameMode = 'pvp';
        startFight();
      } else {
        // VS CPU - go to difficulty select
        modeSelectPhase = 1;
        modeSelectCooldown = 12;
      }
    }

    if (anyBack) {
      // Go back to char select
      keys['Escape'] = false;
      gameState = 'charSelect';
      players[0].confirmed = false;
      players[1].confirmed = false;
      modeSelectCooldown = 15;
    }
  } else {
    // Selecting difficulty
    if (anyLeft) {
      diffSelectIdx = Math.max(0, diffSelectIdx - 1);
      modeSelectCooldown = 12;
      SFX.menuMove();
      keys['KeyA'] = false; keys['ArrowLeft'] = false;
    }
    if (anyRight) {
      diffSelectIdx = Math.min(2, diffSelectIdx + 1);
      modeSelectCooldown = 12;
      SFX.menuMove();
      keys['KeyD'] = false; keys['ArrowRight'] = false;
    }

    if (anyConfirm) {
      SFX.select();
      keys['Enter'] = false; keys['Space'] = false;
      keys['KeyF'] = false; keys['KeyG'] = false;
      keys['KeyK'] = false; keys['KeyL'] = false;
      gameMode = 'cpu';
      cpuDifficulty = diffSelectIdx;
      AI.reset();
      startFight();
    }

    if (anyBack) {
      keys['Escape'] = false;
      modeSelectPhase = 0;
      modeSelectCooldown = 12;
    }
  }
}

// ============================================================
// FIGHT LOGIC
// ============================================================

function startFight() {
  gameState = 'fight';
  stopMusic();
  resetRound();
  players[0].wins = 0;
  players[1].wins = 0;
  roundNum = 1;
  AI.reset();
}

function resetRound() {
  players[0].x = 100;
  players[1].x = 360;
  players[0].hp = 100;
  players[1].hp = 100;
  players[0].state = 'idle';
  players[1].state = 'idle';
  players[0].stateTimer = 0;
  players[1].stateTimer = 0;
  players[0].facing = 'right';
  players[1].facing = 'left';
  players[0].velocity = 0;
  players[1].velocity = 0;
  players[0].cooldown = 0;
  players[1].cooldown = 0;
  players[0].hitstun = 0;
  players[1].hitstun = 0;
  players[0].blockstun = 0;
  players[1].blockstun = 0;
  players[0].specialCooldown = 0;
  players[1].specialCooldown = 0;
  roundTimer = 99;
  roundTimerTick = 0;
  roundState = 'announce';
  roundAnnounceTimer = 120;
  winner = -1;
  projectiles = [];
  particles = [];
  AI.reset();
  SFX.roundAnnounce();
}

const GROUND_Y = H * 0.75 - 64;
const FIGHT_LEFT = 20;
const FIGHT_RIGHT = W - 84;

function getAttackBox(player) {
  const ch = CHARACTERS[player.charIdx];
  const dir = player.facing === 'right' ? 1 : -1;
  if (player.state === 'punch') {
    return { x: player.x + (dir > 0 ? 44 : -18), y: GROUND_Y + 26, w: 22, h: 12 };
  }
  if (player.state === 'kick') {
    return { x: player.x + (dir > 0 ? 44 : -24), y: GROUND_Y + 38, w: 24, h: 10 };
  }
  if (player.state === 'special') {
    return { x: player.x + (dir > 0 ? 48 : -24), y: GROUND_Y + 20, w: 20, h: 20 };
  }
  return null;
}

function getHurtBox(player) {
  return { x: player.x + 16, y: GROUND_Y + 8, w: 32, h: 52 };
}

function boxOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updateFight() {
  if (roundState === 'announce') {
    roundAnnounceTimer--;
    if (roundAnnounceTimer === 40) SFX.fight();
    if (roundAnnounceTimer <= 0) {
      roundState = 'fight';
      playFightMusic();
    }
    return;
  }

  if (roundState === 'ko') {
    roundAnnounceTimer--;
    players.forEach(p => {
      if (p.state === 'ko') p.stateTimer++;
    });
    updateParticles();
    if (roundAnnounceTimer <= 0) {
      if (winner >= 0) {
        players[winner].wins++;
        if (players[winner].wins >= 2) {
          matchWinner = winner;
          gameState = 'matchEnd';
          stopMusic();
          SFX.win();
          return;
        }
      }
      roundNum++;
      resetRound();
    }
    return;
  }

  // Timer
  roundTimerTick++;
  if (roundTimerTick >= 60) {
    roundTimerTick = 0;
    roundTimer--;
    if (roundTimer <= 0) {
      if (players[0].hp > players[1].hp) endRound(0);
      else if (players[1].hp > players[0].hp) endRound(1);
      else endRound(-1);
      return;
    }
  }

  // Get gamepad inputs
  const gp0 = getGamepadInput(0);
  const gp1 = getGamepadInput(1);

  // Player 1 input (keyboard + gamepad 0)
  updatePlayer(0, {
    left: 'KeyA', right: 'KeyD', up: 'KeyW', down: 'KeyS',
    punch: 'KeyF', kick: 'KeyG', special: 'KeyR', block: 'KeyT'
  }, gp0);

  // Player 2 input (keyboard + gamepad 1, or AI)
  if (gameMode === 'cpu') {
    // AI controls player 2
    const aiInput = AI.update(players[1], players[0]);
    updatePlayerFromInput(1, aiInput);
  } else {
    updatePlayer(1, {
      left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', down: 'ArrowDown',
      punch: 'KeyK', kick: 'KeyL', special: 'KeyO', block: 'KeyP'
    }, gp1);
  }

  // Face each other
  if (players[0].state !== 'hit' && players[0].state !== 'ko') {
    players[0].facing = players[0].x < players[1].x ? 'right' : 'left';
  }
  if (players[1].state !== 'hit' && players[1].state !== 'ko') {
    players[1].facing = players[1].x < players[0].x ? 'right' : 'left';
  }

  // Hit detection
  for (let a = 0; a < 2; a++) {
    const b = 1 - a;
    const attacker = players[a];
    const defender = players[b];
    const atkBox = getAttackBox(attacker);
    const hurtBox = getHurtBox(defender);

    if (atkBox && attacker.stateTimer === 4 && hurtBox && boxOverlap(atkBox, hurtBox)) {
      const ch = CHARACTERS[attacker.charIdx];
      let damage = 0;
      if (attacker.state === 'punch') damage = ch.punchDamage;
      else if (attacker.state === 'kick') damage = ch.kickDamage;
      else if (attacker.state === 'special') damage = ch.specialDamage;

      if (defender.state === 'block') {
        damage = Math.floor(damage * 0.15);
        defender.blockstun = 10;
        SFX.block();
        screenShake = 3;
        for (let i = 0; i < 5; i++) addParticle(atkBox.x, atkBox.y, '#88ccff');
      } else {
        defender.hp = Math.max(0, defender.hp - damage);
        defender.state = 'hit';
        defender.stateTimer = 0;
        defender.hitstun = 15;
        if (attacker.state === 'punch') SFX.punch();
        else if (attacker.state === 'kick') SFX.kick();
        else SFX.special();
        screenShake = attacker.state === 'special' ? 8 : 5;
        for (let i = 0; i < 8; i++) addParticle(atkBox.x + atkBox.w/2, atkBox.y, '#ff4444');
        for (let i = 0; i < 4; i++) addParticle(atkBox.x + atkBox.w/2, atkBox.y, '#ffcc00');
        const kb = attacker.state === 'special' ? 8 : 4;
        defender.x += (attacker.facing === 'right' ? kb : -kb);
      }

      if (defender.hp <= 0) {
        defender.state = 'ko';
        defender.stateTimer = 0;
        endRound(a);
        return;
      }
    }
  }

  // Update projectiles
  projectiles.forEach(p => {
    p.x += p.vx;
    p.life--;
    const target = players[1 - p.owner];
    const hb = getHurtBox(target);
    if (boxOverlap({x: p.x, y: p.y, w: 8, h: 8}, hb) && target.state !== 'ko') {
      if (target.state === 'block') {
        target.blockstun = 10;
        SFX.block();
        p.life = 0;
      } else {
        target.hp = Math.max(0, target.hp - 10);
        target.state = 'hit';
        target.stateTimer = 0;
        target.hitstun = 12;
        SFX.punch();
        screenShake = 4;
        p.life = 0;
        for (let i = 0; i < 6; i++) addParticle(p.x, p.y, '#ff8800');
        if (target.hp <= 0) {
          target.state = 'ko';
          target.stateTimer = 0;
          endRound(p.owner);
        }
      }
    }
  });
  projectiles = projectiles.filter(p => p.life > 0 && p.x > -20 && p.x < W + 20);

  updateParticles();

  if (screenShake > 0) screenShake *= 0.85;
  if (screenShake < 0.5) screenShake = 0;
}

// Update player with keyboard controls + optional gamepad input
function updatePlayer(idx, controls, gpInput) {
  const p = players[idx];
  const ch = CHARACTERS[p.charIdx];

  if (p.cooldown > 0) p.cooldown--;
  if (p.specialCooldown > 0) p.specialCooldown--;

  if (p.hitstun > 0) {
    p.hitstun--;
    p.stateTimer++;
    if (p.hitstun <= 0) {
      p.state = 'idle';
      p.stateTimer = 0;
    }
    return;
  }

  if (p.blockstun > 0) {
    p.blockstun--;
    const kbBlock = keys[controls.block];
    const gpBlock = gpInput && gpInput.block;
    if (p.blockstun <= 0 && p.state === 'block' && !kbBlock && !gpBlock) {
      p.state = 'idle';
      p.stateTimer = 0;
    }
    return;
  }

  if (p.state === 'punch' || p.state === 'kick' || p.state === 'special') {
    p.stateTimer++;
    const dur = p.state === 'special' ? 20 : 12;
    if (p.stateTimer >= dur) {
      p.state = 'idle';
      p.stateTimer = 0;
      p.cooldown = 8;
    }
    return;
  }

  // Block (keyboard OR gamepad)
  const kbBlock = keys[controls.block];
  const gpBlock = gpInput && gpInput.block;
  if (kbBlock || gpBlock) {
    p.state = 'block';
    p.stateTimer++;
    return;
  } else if (p.state === 'block') {
    p.state = 'idle';
    p.stateTimer = 0;
  }

  // Movement (keyboard OR gamepad)
  let moving = false;
  const goLeft = keys[controls.left] || (gpInput && gpInput.left);
  const goRight = keys[controls.right] || (gpInput && gpInput.right);
  if (goLeft) { p.x -= ch.speed; moving = true; }
  if (goRight) { p.x += ch.speed; moving = true; }

  p.x = Math.max(FIGHT_LEFT, Math.min(FIGHT_RIGHT, p.x));

  const other = players[1 - idx];
  const dist = Math.abs(p.x - other.x);
  if (dist < 40) {
    if (p.x < other.x) p.x = other.x - 40;
    else p.x = other.x + 40;
    p.x = Math.max(FIGHT_LEFT, Math.min(FIGHT_RIGHT, p.x));
  }

  // Attacks (keyboard with key-consume, OR gamepad justPressed)
  const gpPunch = gpInput && gpInput.punch;
  const gpKick = gpInput && gpInput.kick;
  const gpSpecial = gpInput && gpInput.special;

  if ((keys[controls.punch] || gpPunch) && p.cooldown <= 0) {
    p.state = 'punch';
    p.stateTimer = 0;
    p.cooldown = 15;
    keys[controls.punch] = false;
    return;
  }
  if ((keys[controls.kick] || gpKick) && p.cooldown <= 0) {
    p.state = 'kick';
    p.stateTimer = 0;
    p.cooldown = 15;
    keys[controls.kick] = false;
    return;
  }
  if ((keys[controls.special] || gpSpecial) && p.cooldown <= 0 && p.specialCooldown <= 0) {
    p.state = 'special';
    p.stateTimer = 0;
    p.cooldown = 20;
    p.specialCooldown = 90;
    keys[controls.special] = false;
    return;
  }

  if (moving) {
    if (p.state !== 'walk') { p.state = 'walk'; p.stateTimer = 0; }
    p.stateTimer++;
  } else {
    if (p.state === 'walk') { p.state = 'idle'; p.stateTimer = 0; }
    p.stateTimer++;
  }
}

// Update player from a virtual input object (used by AI)
function updatePlayerFromInput(idx, input) {
  const p = players[idx];
  const ch = CHARACTERS[p.charIdx];

  if (p.cooldown > 0) p.cooldown--;
  if (p.specialCooldown > 0) p.specialCooldown--;

  if (p.hitstun > 0) {
    p.hitstun--;
    p.stateTimer++;
    if (p.hitstun <= 0) {
      p.state = 'idle';
      p.stateTimer = 0;
    }
    return;
  }

  if (p.blockstun > 0) {
    p.blockstun--;
    if (p.blockstun <= 0 && p.state === 'block' && !input.block) {
      p.state = 'idle';
      p.stateTimer = 0;
    }
    return;
  }

  if (p.state === 'punch' || p.state === 'kick' || p.state === 'special') {
    p.stateTimer++;
    const dur = p.state === 'special' ? 20 : 12;
    if (p.stateTimer >= dur) {
      p.state = 'idle';
      p.stateTimer = 0;
      p.cooldown = 8;
    }
    return;
  }

  if (input.block) {
    p.state = 'block';
    p.stateTimer++;
    return;
  } else if (p.state === 'block') {
    p.state = 'idle';
    p.stateTimer = 0;
  }

  let moving = false;
  if (input.left) { p.x -= ch.speed; moving = true; }
  if (input.right) { p.x += ch.speed; moving = true; }

  p.x = Math.max(FIGHT_LEFT, Math.min(FIGHT_RIGHT, p.x));

  const other = players[1 - idx];
  const dist = Math.abs(p.x - other.x);
  if (dist < 40) {
    if (p.x < other.x) p.x = other.x - 40;
    else p.x = other.x + 40;
    p.x = Math.max(FIGHT_LEFT, Math.min(FIGHT_RIGHT, p.x));
  }

  if (input.punch && p.cooldown <= 0) {
    p.state = 'punch';
    p.stateTimer = 0;
    p.cooldown = 15;
    return;
  }
  if (input.kick && p.cooldown <= 0) {
    p.state = 'kick';
    p.stateTimer = 0;
    p.cooldown = 15;
    return;
  }
  if (input.special && p.cooldown <= 0 && p.specialCooldown <= 0) {
    p.state = 'special';
    p.stateTimer = 0;
    p.cooldown = 20;
    p.specialCooldown = 90;
    return;
  }

  if (moving) {
    if (p.state !== 'walk') { p.state = 'walk'; p.stateTimer = 0; }
    p.stateTimer++;
  } else {
    if (p.state === 'walk') { p.state = 'idle'; p.stateTimer = 0; }
    p.stateTimer++;
  }
}

function endRound(winnerIdx) {
  roundState = 'ko';
  winner = winnerIdx;
  roundAnnounceTimer = 150;
  stopMusic();
  SFX.ko();
  flashTimer = 15;
  screenShake = 12;
  const loser = players[1 - winnerIdx];
  if (loser) {
    for (let i = 0; i < 20; i++) {
      addParticle(loser.x + 32, GROUND_Y + 32, i % 2 === 0 ? '#ff4444' : '#ffcc00', 40);
    }
  }
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
}

function drawFight() {
  ctx.save();
  if (screenShake > 0) {
    ctx.translate(
      (Math.random() - 0.5) * screenShake * 2,
      (Math.random() - 0.5) * screenShake * 2
    );
  }

  STAGES[selectedStage].draw(ctx, W, H, frameCount);

  if (flashTimer > 0) {
    ctx.globalAlpha = flashTimer / 15 * 0.5;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    flashTimer--;
  }

  for (let i = 0; i < 2; i++) {
    const p = players[i];
    const ch = CHARACTERS[p.charIdx];
    const sprite = drawCharSprite(ch, p.state, p.stateTimer, p.facing);
    ctx.drawImage(sprite, p.x, GROUND_Y, 64, 64);

    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(p.x + 32, GROUND_Y + 62, 20, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  projectiles.forEach(p => {
    ctx.fillStyle = CHARACTERS[players[p.owner].charIdx].colors.accent;
    ctx.beginPath();
    ctx.arc(p.x + 4, p.y + 4, 4 + Math.sin(frameCount * 0.3), 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(p.x + 4, p.y + 4, 2, 0, Math.PI * 2);
    ctx.fill();
  });

  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 3, 3);
  });
  ctx.globalAlpha = 1;

  ctx.restore();

  drawHUD();

  if (roundState === 'announce') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, H/2 - 40, W, 80);

    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';

    if (roundAnnounceTimer > 40) {
      ctx.fillStyle = '#ffcc00';
      ctx.fillText(`ROUND ${roundNum}`, W/2, H/2 + 5);
    } else {
      ctx.fillStyle = '#ff4444';
      ctx.fillText('FIGHT!', W/2, H/2 + 5);
    }
    ctx.textAlign = 'left';
  }

  if (roundState === 'ko') {
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText('K.O.!', W/2 + 3, H/2 + 3);
    ctx.fillStyle = '#ff0000';
    ctx.fillText('K.O.!', W/2, H/2);

    if (winner >= 0 && roundAnnounceTimer < 80) {
      ctx.font = '16px monospace';
      ctx.fillStyle = '#ffcc00';
      ctx.fillText(`${CHARACTERS[players[winner].charIdx].name} WINS!`, W/2, H/2 + 30);
    }
    ctx.textAlign = 'left';
  }
}

function drawHUD() {
  ctx.fillStyle = '#111';
  ctx.fillRect(10, 10, 200, 20);
  ctx.fillRect(W - 210, 10, 200, 20);

  const hp1w = (players[0].hp / players[0].maxHp) * 196;
  const hp2w = (players[1].hp / players[1].maxHp) * 196;

  const hp1color = players[0].hp > 50 ? '#00cc44' : (players[0].hp > 25 ? '#cccc00' : '#cc0000');
  ctx.fillStyle = hp1color;
  ctx.fillRect(12, 12, hp1w, 16);

  const hp2color = players[1].hp > 50 ? '#00cc44' : (players[1].hp > 25 ? '#cccc00' : '#cc0000');
  ctx.fillStyle = hp2color;
  ctx.fillRect(W - 12 - hp2w, 12, hp2w, 16);

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, 200, 20);
  ctx.strokeRect(W - 210, 10, 200, 20);

  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = '#4444ff';
  ctx.textAlign = 'left';
  ctx.fillText('P1 ' + CHARACTERS[players[0].charIdx].name, 12, 44);
  ctx.fillStyle = '#ff4444';
  ctx.textAlign = 'right';
  const p2Label = gameMode === 'cpu' ? 'CPU' : 'P2';
  ctx.fillText(CHARACTERS[players[1].charIdx].name + ' ' + p2Label, W - 12, 44);

  // Timer
  ctx.font = 'bold 24px monospace';
  ctx.fillStyle = roundTimer <= 10 ? '#ff0000' : '#ffcc00';
  ctx.textAlign = 'center';
  ctx.fillText(roundTimer.toString().padStart(2, '0'), W/2, 28);

  // Round indicators
  for (let i = 0; i < 2; i++) {
    for (let w = 0; w < 2; w++) {
      const x = i === 0 ? 220 + w * 16 : W - 236 - w * 16;
      ctx.fillStyle = w < players[i].wins ? '#ffcc00' : '#333';
      ctx.beginPath();
      ctx.arc(x, 20, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  ctx.font = '10px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText(`ROUND ${roundNum}`, W/2, 44);

  // Game mode indicator
  if (gameMode === 'cpu') {
    const diffNames = ['EASY', 'MEDIUM', 'HARD'];
    const diffColors = ['#44cc44', '#ffaa00', '#ff2222'];
    ctx.font = '8px monospace';
    ctx.fillStyle = diffColors[cpuDifficulty];
    ctx.fillText(`VS CPU: ${diffNames[cpuDifficulty]}`, W/2, 54);
  }

  // Special cooldown
  for (let i = 0; i < 2; i++) {
    const x = i === 0 ? 12 : W - 80;
    const cd = players[i].specialCooldown;
    const pct = 1 - (cd / 90);
    ctx.fillStyle = '#222';
    ctx.fillRect(x, 50, 68, 6);
    ctx.fillStyle = pct >= 1 ? '#ff8800' : '#553300';
    ctx.fillRect(x, 50, 68 * pct, 6);
    ctx.font = '7px monospace';
    ctx.fillStyle = '#aaa';
    ctx.textAlign = i === 0 ? 'left' : 'right';
    ctx.fillText('SP', i === 0 ? x : x + 68, 58 + 7);
  }

  ctx.textAlign = 'left';
}

// ============================================================
// MATCH END SCREEN
// ============================================================

function drawMatchEnd() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  const ch = CHARACTERS[players[matchWinner].charIdx];
  const grd = ctx.createRadialGradient(W/2, H/2, 10, W/2, H/2, 200);
  grd.addColorStop(0, ch.colors.accent + '44');
  grd.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(ch.name, W/2, 60);

  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('WINS!', W/2, 90);

  const sprite = drawCharSprite(ch, 'idle', frameCount, 'right');
  ctx.drawImage(sprite, W/2 - 64, 100, 128, 128);

  ctx.font = '14px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText(`${players[0].wins} - ${players[1].wins}`, W/2, 250);

  // Show mode info
  if (gameMode === 'cpu') {
    const diffNames = ['EASY', 'MEDIUM', 'HARD'];
    const winnerLabel = matchWinner === 0 ? 'PLAYER' : 'CPU';
    ctx.font = '11px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText(`VS CPU (${diffNames[cpuDifficulty]}) — ${winnerLabel} WINS`, W/2, 264);
  }

  const quote = ch.quotes[Math.floor(frameCount / 300) % ch.quotes.length];
  ctx.font = '11px monospace';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(quote, W/2, 285);

  if (frameCount % 60 < 40) {
    ctx.font = '14px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('PRESS ENTER FOR REMATCH', W/2, 340);
  }
  ctx.font = '10px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('PRESS ESC FOR CHARACTER SELECT', W/2, 360);

  ctx.textAlign = 'left';

  const gp0 = getGamepadInput(0);
  const gp1 = getGamepadInput(1);

  if (keys['Enter'] || (gp0 && gp0.confirm) || (gp1 && gp1.confirm)) {
    keys['Enter'] = false;
    startFight();
  }
  if (keys['Escape'] || (gp0 && gp0.back) || (gp1 && gp1.back)) {
    keys['Escape'] = false;
    gameState = 'charSelect';
    players[0].confirmed = false;
    players[1].confirmed = false;
    playMenuMusic();
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================

function update() {
  frameCount++;
  pollGamepads();

  switch(gameState) {
    case 'title': updateTitle(); break;
    case 'charSelect': updateCharSelect(); break;
    case 'modeSelect': updateModeSelect(); break;
    case 'fight': updateFight(); break;
    case 'matchEnd': break;
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  switch(gameState) {
    case 'title': drawTitle(); break;
    case 'charSelect': drawCharSelect(); break;
    case 'modeSelect': drawModeSelect(); break;
    case 'fight': drawFight(); break;
    case 'matchEnd': drawMatchEnd(); break;
  }

  // Scanline effect
  ctx.globalAlpha = 0.03;
  for (let y = 0; y < H; y += 2) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, y, W, 1);
  }
  ctx.globalAlpha = 1;
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Start!
gameLoop();

</script>
