<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Definitely Not Street Fighter II - Arcade Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;cursor:none}

#touch-overlay.active{display:block}

#landscape-prompt{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:100;justify-content:center;align-items:center;flex-direction:column;color:#ffcc00;font-family:monospace;text-align:center}
#landscape-prompt.show{display:flex}
#landscape-prompt .rotate-icon{font-size:64px;animation:rotate-hint 2s ease-in-out infinite}
#landscape-prompt p{font-size:18px;margin-top:16px}
@keyframes rotate-hint{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}

<body>
<div id="landscape-prompt"><div class="rotate-icon">📱</div><p>Rotate your device to landscape</p></div>
<canvas id="game"></canvas>
<div id="touch-overlay"></div>
<script>
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const W=768,H=512;canvas.width=W;canvas.height=H;
function resize(){const s=Math.min(innerWidth/W,innerHeight/H);canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px'}
resize();addEventListener('resize',resize);

// === AUDIO ===
let ac=null;
function ea(){if(!ac)ac=new(AudioContext||webkitAudioContext)();if(ac.state==='suspended')ac.resume()}
function tone(f,d,t='square',v=.15){ea();const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}
function noise(d,v=.2){ea();const b=ac.createBuffer(1,ac.sampleRate*d,ac.sampleRate),dt=b.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;const s=ac.createBufferSource(),g=ac.createGain();s.buffer=b;g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);s.connect(g);g.connect(ac.destination);s.start()}

const SFX={
  lPunch(){tone(300,.06,'square',.25);noise(.06,.2)},
  hPunch(){tone(120,.1,'sawtooth',.35);noise(.12,.35);tone(60,.15,'sine',.2)},
  lKick(){tone(250,.07,'square',.2);noise(.08,.22)},
  hKick(){tone(100,.12,'sawtooth',.3);noise(.15,.35);tone(50,.18,'sine',.25)},
  block(){tone(800,.04,'triangle',.2);tone(600,.06,'triangle',.15)},
  special(){tone(200,.08,'sawtooth',.25);setTimeout(()=>tone(600,.1,'sawtooth',.3),80)},
  superMove(){for(let i=0;i<6;i++)setTimeout(()=>{tone(200+i*120,.1,'sawtooth',.2);noise(.06,.12)},i*50);setTimeout(()=>{tone(60,.4,'sine',.3);noise(.3,.25)},300)},
  ko(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.35,'square',.25),i*150));noise(.5,.2);tone(40,.5,'sine',.3)},
  select(){tone(440,.08,'square',.15);tone(880,.12,'square',.18)},
  menuMove(){tone(330,.04,'square',.1)},
  fight(){tone(200,.12,'sawtooth',.3);setTimeout(()=>{tone(400,.18,'sawtooth',.35);noise(.15,.25)},80)},
  win(){[523,659,784,1047,784,1047,1318].forEach((f,i)=>setTimeout(()=>tone(f,.25,'square',.2),i*150))},
  jump(){tone(300,.06,'square',.1);tone(500,.08,'square',.08)},
  land(){tone(80,.08,'sine',.12);noise(.04,.08)},
  sweep(){tone(100,.15,'square',.2);noise(.15,.25)},
  throwSfx(){tone(150,.15,'sawtooth',.25);noise(.2,.2)},
  roundAnnounce(){[300,400,500,600,500,400].forEach((f,i)=>setTimeout(()=>tone(f,.1,'sawtooth',.2),i*70))}
};

// Announcer
const Ann={
  speak(t,r=1.2,p=.8){if(!speechSynthesis)return;const u=new SpeechSynthesisUtterance(t);u.rate=r;u.pitch=p;u.volume=.8;speechSynthesis.cancel();speechSynthesis.speak(u)},
  round(n){this.speak('Round '+n,1,.7)},
  fight(){setTimeout(()=>this.speak('Fight!',1.4,.6),100)},
  ko(){this.speak('K O!',1,.5)},
  perfect(){this.speak('Perfect!',1.1,.8)},
  youWin(){this.speak('You win!',1,.7)},
  timeUp(){this.speak('Time!',1.2,.6)}
};

// Music
let musicInt=null,musicOn=false;
function stopMusic(){if(musicInt){clearInterval(musicInt);musicInt=null}musicOn=false}
function playMusic(mel,bas,tmp=200,sty='square'){
  stopMusic();musicOn=true;let i=0;
  const p=()=>{if(!musicOn)return;ea();if(bas[i%bas.length]>0)tone(bas[i%bas.length],tmp/1200,'triangle',.04);if(i%2===0&&mel[Math.floor(i/2)%mel.length]>0)tone(mel[Math.floor(i/2)%mel.length],tmp/1400,sty,.03);if(i%4===0)noise(.03,.04);i++};
  p();musicInt=setInterval(p,tmp);
}
const SMUS=[
  {m:[523,587,698,784,1047,784,698,587,523,440,523,587,698,784,698,587],b:[130,130,165,165,196,196,165,165,130,130,110,110,146,146,130,130],t:180,s:'square'},
  {m:[392,440,523,587,523,440,392,349,392,523,659,587,523,440,392,349],b:[98,98,130,130,110,110,98,98,87,87,110,110,130,130,146,146],t:160,s:'sawtooth'},
  {m:[330,392,440,523,494,440,392,330,349,440,523,587,523,440,349,330],b:[110,110,130,130,146,146,165,165,130,130,110,110,146,146,130,130],t:220,s:'square'},
  {m:[262,311,349,415,349,311,262,233,262,349,466,415,349,311,262,233],b:[65,65,78,78,87,87,78,78,65,65,58,58,69,69,65,65],t:240,s:'sawtooth'}
];
function playMenuMusic(){playMusic([262,330,392,523,440,392,330,262,294,370,440,523,494,440,370,294],[130,130,165,165,220,220,196,196,146,146,165,165,196,196,175,175],250,'square')}
function playFightMusic(si){const m=SMUS[si%4];playMusic(m.m,m.b,m.t,m.s)}

// === HELPERS ===
function pxR(c,x,y,w,h,col){c.fillStyle=col;c.fillRect(x,y,w,h)}
function pxC(c,x,y,r,col){c.fillStyle=col;c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill()}

// === CHARACTERS ===
const CHARS=[
  {id:'shadow',name:'SHADOW',sub:'Silent Storm',
   col:{body:'#2a2a5e',bd:'#1a1a3e',acc:'#8844cc',al:'#aa66ee',skin:'#e8c090',sd:'#c8a070',hair:'#222',eyes:'#ff4444',belt:'#cc2222',pants:'#1a1a3e',shoes:'#111'},
   spd:4.5,jp:-14,wt:.9, lp:5,hp:9,lk:6,hk:11,sw:8,
   spN:'SHURIKEN',spD:12,spT:'proj',thD:14,suN:'SHADOW CLONE',suD:30,
   quotes:['"The shadows judged you."','"You didn\'t see me coming."','"Omae wa mou... wrong anime."'],bt:'lean'},
  {id:'brutus',name:'BRUTUS',sub:'Human Tank',
   col:{body:'#cc4400',bd:'#993300',acc:'#ffaa00',al:'#ffcc44',skin:'#d4a574',sd:'#b48554',hair:'#553300',eyes:'#fff',belt:'#222',pants:'#884400',shoes:'#553300'},
   spd:2.8,jp:-11,wt:1.3, lp:7,hp:14,lk:7,hk:13,sw:10,
   spN:'GROUND POUND',spD:16,spT:'gp',thD:20,suN:'EARTHQUAKE',suD:35,
   quotes:['"I didn\'t skip ANY day."','"THUNDERPUNCH!"','"Brick-shaped mark!"'],bt:'heavy'},
  {id:'zen',name:'ZEN',sub:'Fist of Tranquility',
   col:{body:'#dd8800',bd:'#aa6600',acc:'#ffcc44',al:'#ffee88',skin:'#f0d0a0',sd:'#d0b080',hair:'#ccc',eyes:'#44aaff',belt:'#aa6600',pants:'#cc7700',shoes:'#885500'},
   spd:3.5,jp:-13,wt:1, lp:6,hp:10,lk:7,hk:12,sw:9,
   spN:'CHI BLAST',spD:14,spT:'proj',thD:15,suN:'MEDITATION BURST',suD:28,
   quotes:['"Inner peace... OUTER DESTRUCTION!"','"40 years for THIS."','"Through YOUR FACE."'],bt:'balanced'},
  {id:'neon',name:'NEON',sub:'System Override',
   col:{body:'#1a1a2e',bd:'#0a0a1e',acc:'#00ff88',al:'#44ffaa',skin:'#c8b8a8',sd:'#a89888',hair:'#00ffcc',eyes:'#ff00ff',belt:'#004422',pants:'#0a0a2e',shoes:'#001111'},
   spd:3.8,jp:-13,wt:.85, lp:5,hp:9,lk:6,hk:10,sw:8,
   spN:'ELEC BOLT',spD:13,spT:'proj',thD:13,suN:'EMP FIELD',suD:26,
   quotes:['"git push --force YOUR_FACE"','"404: Skills not found."','"Mainframe... of PAIN!"'],bt:'lean'}
];

// === SPRITE DRAWING (96x128) ===
const SW=96,SH=128;
const spCache={};let spCacheCount=0;

function getSprite(ci,pose,fr,face){
  const k=`${ci}_${pose}_${(fr/4|0)%6}_${face}`;
  if(spCache[k])return spCache[k];
  if(spCacheCount>300){for(const k2 in spCache){delete spCache[k2];spCacheCount--;if(spCacheCount<200)break}}
  const cv=document.createElement('canvas');cv.width=SW;cv.height=SH;
  const c=cv.getContext('2d');
  drawChar(c,ci,pose,fr,face);
  spCache[k]=cv;spCacheCount++;
  return cv;
}

function drawChar(c,ci,pose,fr,face){
  const ch=CHARS[ci],cl=ch.col;
  const af=(fr/4|0)%6, bob=Math.sin(fr*.1)*2;
  const hvy=ch.bt==='heavy', bw=hvy?38:28, sw2=hvy?46:36, lw=hvy?14:10, aw=hvy?12:8;
  const cx0=48;
  
  if(face==='left'){c.translate(SW,0);c.scale(-1,1)}
  
  // Helper: head
  const drawHead=(x,y)=>{
    pxR(c,x-10,y,20,22,cl.skin);pxR(c,x-11,y-2,22,8,cl.hair);
    pxR(c,x-6,y+8,4,4,'#fff');pxR(c,x+2,y+8,4,4,'#fff');
    pxR(c,x-5,y+9,3,3,cl.eyes);pxR(c,x+3,y+9,3,3,cl.eyes);
    pxR(c,x-3,y+16,6,2,cl.sd);
    if(ci===0){pxR(c,x-8,y+13,16,5,'#333');pxR(c,x-12,y+5,24,3,'#cc2222')}
    if(ci===1){pxR(c,x-4,y-8,8,8,cl.hair);pxR(c,x-3,y-12,6,6,cl.hair)}
    if(ci===2){for(let i=0;i<3;i++)pxC(c,x-4+i*4,y+2,1.5,cl.eyes);pxR(c,x-4,y+17,8,5,'#ccc')}
    if(ci===3){pxR(c,x-9,y+7,18,4,'#00ff88');pxR(c,x-12,y-3,24,6,cl.hair)}
  };
  
  // Helper: body
  const drawBody=(x,y)=>{
    pxR(c,x-4,y,8,6,cl.skin);
    pxR(c,x-bw/2,y+4,bw,28,cl.body);
    pxR(c,x-sw2/2,y+4,sw2,7,cl.body);
    pxR(c,x-bw/2,y+28,bw,5,cl.belt);
    pxR(c,x-bw/2+2,y+8,bw-4,3,cl.acc);
  };
  
  // Helper: legs
  const drawLegs=(x,y,spread=0)=>{
    pxR(c,x-bw/2+2+spread,y,lw,30,cl.pants);
    pxR(c,x+bw/2-lw-2-spread,y,lw,30,cl.pants);
    pxR(c,x-bw/2+spread,y+28,lw+4,8,cl.shoes);
    pxR(c,x+bw/2-lw-4-spread,y+28,lw+4,8,cl.shoes);
  };
  
  const drawArm=(x,y,l)=>{pxR(c,x,y,aw,l,cl.skin);pxR(c,x-1,y+l-2,aw+2,aw+2,cl.skin)};
  
  switch(pose){
    case 'idle':{
      const b=bob|0;
      drawHead(cx0,18+b);drawBody(cx0,38+b);drawLegs(cx0,70+b);
      drawArm(cx0-sw2/2-aw,46+b,22);drawArm(cx0+sw2/2,44+b,24);
      break;
    }
    case 'walk':{
      const st=Math.sin(fr*.2)*6|0;
      drawHead(cx0,18);drawBody(cx0,38);
      pxR(c,cx0-bw/2+2+st,70,lw,30,cl.pants);pxR(c,cx0+bw/2-lw-2-st,70,lw,30,cl.pants);
      pxR(c,cx0-bw/2+st,98,lw+4,8,cl.shoes);pxR(c,cx0+bw/2-lw-4-st,98,lw+4,8,cl.shoes);
      drawArm(cx0-sw2/2-aw,44-st,22);drawArm(cx0+sw2/2,44+st,22);
      break;
    }
    case 'crouch':{
      drawHead(cx0,34);drawBody(cx0,54);
      pxR(c,cx0-bw/2-4,82,lw+8,18,cl.pants);pxR(c,cx0+bw/2-lw,82,lw+8,18,cl.pants);
      pxR(c,cx0-bw/2-6,98,lw+10,8,cl.shoes);pxR(c,cx0+bw/2-lw-2,98,lw+10,8,cl.shoes);
      drawArm(cx0-sw2/2-aw,58,16);drawArm(cx0+sw2/2,60,14);
      break;
    }
    case 'jump':case 'jumpUp':case 'jumpFall':{
      drawHead(cx0,8);drawBody(cx0,28);
      pxR(c,cx0-bw/2,56,lw+2,22,cl.pants);pxR(c,cx0+bw/2-lw,58,lw+2,20,cl.pants);
      pxR(c,cx0-bw/2-2,76,lw+4,8,cl.shoes);pxR(c,cx0+bw/2-lw-2,76,lw+4,8,cl.shoes);
      drawArm(cx0-sw2/2-aw-4,28,18);drawArm(cx0+sw2/2+2,30,16);
      break;
    }
    case 'lightPunch':{
      drawHead(cx0,18);drawBody(cx0,38);drawLegs(cx0,70);
      drawArm(cx0-sw2/2-aw,48,20);
      const ext=af<2?af*14:Math.max(0,28-(af-2)*10);
      pxR(c,cx0+sw2/2,42,aw+ext,10,cl.skin);pxR(c,cx0+sw2/2+ext,40,aw+4,14,cl.skin);
      if(ext>18){for(let i=0;i<4;i++){const a=fr*.5+i*1.5;pxR(c,cx0+sw2/2+ext+aw+Math.cos(a)*8,44+Math.sin(a)*8,3,3,['#fff','#ff0','#f80'][i%3])}}
      break;
    }
    case 'heavyPunch':{
      drawHead(cx0-3,20);drawBody(cx0-3,40);drawLegs(cx0-3,72);
      drawArm(cx0-sw2/2-aw-3,46,22);
      const ext=af<3?af*10:Math.max(0,30-(af-3)*8);
      pxR(c,cx0+sw2/2-3,36,aw+ext+6,14,cl.skin);pxR(c,cx0+sw2/2+ext,33,aw+8,20,cl.skin);
      if(ext>20){for(let i=0;i<6;i++){const a=fr*.5+i*1;pxR(c,cx0+sw2/2+ext+aw+4+Math.cos(a)*12,40+Math.sin(a)*12,4,4,['#fff','#ff0','#f80','#f00'][i%4])};pxC(c,cx0+sw2/2+ext+aw+4,42,6,'#fff')}
      break;
    }
    case 'lightKick':{
      drawHead(cx0-4,18);drawBody(cx0-4,38);
      pxR(c,cx0-bw/2-4,70,lw+2,30,cl.pants);pxR(c,cx0-bw/2-6,98,lw+6,8,cl.shoes);
      drawArm(cx0-sw2/2-aw-4,42,20);drawArm(cx0+sw2/2-4,44,18);
      const ext=af<2?af*14:Math.max(0,28-(af-2)*10);
      pxR(c,cx0+6,82,lw+ext,10,cl.pants);pxR(c,cx0+6+ext,80,lw+4,14,cl.shoes);
      if(ext>18){for(let i=0;i<4;i++){const a=fr*.5+i*1.5;pxR(c,cx0+6+ext+lw+2+Math.cos(a)*6,84+Math.sin(a)*6,3,3,['#fff','#ff0'][i%2])}}
      break;
    }
    case 'heavyKick':{
      drawHead(cx0-6,16);drawBody(cx0-6,36);
      pxR(c,cx0-bw/2-6,68,lw+2,32,cl.pants);pxR(c,cx0-bw/2-8,98,lw+6,8,cl.shoes);
      drawArm(cx0-sw2/2-aw-6,40,20);drawArm(cx0+sw2/2-6,42,18);
      const ext=af<3?af*12:Math.max(0,36-(af-3)*10);
      pxR(c,cx0+4,76,lw+ext+4,14,cl.pants);pxR(c,cx0+4+ext+4,73,lw+6,18,cl.shoes);
      if(ext>24){for(let i=0;i<6;i++){const a=fr*.4+i*1;pxR(c,cx0+4+ext+lw+8+Math.cos(a)*10,80+Math.sin(a)*10,4,4,['#fff','#ff0','#f80','#f00'][i%4])};pxC(c,cx0+4+ext+lw+8,82,5,'#fff')}
      break;
    }
    case 'crouchPunch':{
      drawHead(cx0,30);
      pxR(c,cx0-bw/2,50,bw,28,cl.body);pxR(c,cx0-bw/2,74,bw,4,cl.belt);
      pxR(c,cx0-bw/2-2,76,lw+4,24,cl.pants);pxR(c,cx0+bw/2-lw,76,lw+4,24,cl.pants);
      pxR(c,cx0-bw/2-2,98,lw+6,8,cl.shoes);pxR(c,cx0+bw/2-lw,98,lw+6,8,cl.shoes);
      drawArm(cx0-sw2/2-aw,54,16);
      const ext=af<2?af*14:Math.max(0,28-(af-2)*10);
      pxR(c,cx0+sw2/2,52,aw+ext,10,cl.skin);pxR(c,cx0+sw2/2+ext,50,aw+4,14,cl.skin);
      break;
    }
    case 'crouchKick':{
      pxR(c,cx0-bw/2,50,bw,28,cl.body);pxR(c,cx0-bw/2,74,bw,4,cl.belt);
      drawHead(cx0,30);
      pxR(c,cx0-bw/2-4,76,lw+4,26,cl.pants);pxR(c,cx0-bw/2-4,100,lw+6,8,cl.shoes);
      drawArm(cx0-sw2/2-aw,54,16);drawArm(cx0+sw2/2,56,14);
      const ext=af<3?af*14:Math.max(0,42-(af-3)*12);
      pxR(c,cx0+2,90,lw+ext,10,cl.pants);pxR(c,cx0+2+ext,88,lw+6,14,cl.shoes);
      break;
    }
    case 'jumpPunch':{
      drawHead(cx0,8);drawBody(cx0,28);
      pxR(c,cx0-bw/2,56,lw+2,20,cl.pants);pxR(c,cx0+bw/2-lw,58,lw+2,18,cl.pants);
      drawArm(cx0-sw2/2-aw,30,16);
      const ext=af<2?af*12:Math.max(0,24-(af-2)*8);
      pxR(c,cx0+sw2/2,32,aw+ext,10,cl.skin);pxR(c,cx0+sw2/2+ext,30,aw+4,14,cl.skin);
      break;
    }
    case 'jumpKick':{
      drawHead(cx0,8);drawBody(cx0,28);
      pxR(c,cx0-bw/2,56,lw+2,18,cl.pants);
      drawArm(cx0-sw2/2-aw,30,14);drawArm(cx0+sw2/2,32,12);
      const ext=af<2?af*14:Math.max(0,28-(af-2)*10);
      pxR(c,cx0+4,52,lw+ext,12,cl.pants);pxR(c,cx0+4+ext,50,lw+6,16,cl.shoes);
      break;
    }
    case 'special':{
      drawHead(cx0,18);drawBody(cx0,38);drawLegs(cx0,70);
      drawArm(cx0-sw2/2-aw,46,20);
      const ext=af<3?af*8:24;
      pxR(c,cx0+sw2/2,38,aw+ext,12,cl.skin);
      const r=6+Math.sin(fr*.3)*3;
      pxC(c,cx0+sw2/2+ext+aw+8,44,r,cl.acc);pxC(c,cx0+sw2/2+ext+aw+8,44,r*.5,'#fff');
      for(let i=0;i<4;i++){const sx=cx0+sw2/2+ext+aw+8+Math.cos(fr*.2+i*1.5)*r*1.5;pxR(c,sx,44+Math.sin(fr*.2+i*1.5)*r*1.5-2,2,2,cl.al)}
      break;
    }
    case 'superMove':{
      const glow=Math.sin(fr*.2)*.3+.4;
      c.globalAlpha=glow;pxC(c,cx0,58,40+Math.sin(fr*.15)*8,cl.acc);c.globalAlpha=1;
      drawHead(cx0,16);drawBody(cx0,36);drawLegs(cx0,68);
      pxR(c,cx0-sw2/2-aw-16,34,aw+16,10,cl.skin);
      pxR(c,cx0+sw2/2,34,aw+16,10,cl.skin);
      for(let i=0;i<8;i++){const a=fr*.1+i*Math.PI/4;pxR(c,cx0+Math.cos(a)*30,52+Math.sin(a)*25,4,4,cl.al)}
      break;
    }
    case 'throw':{
      drawHead(cx0-5,20);drawBody(cx0-5,40);drawLegs(cx0-5,72);
      const grab=Math.min(af*8,24);
      pxR(c,cx0+sw2/2-5,38,14+grab,12,cl.skin);pxR(c,cx0+sw2/2+grab+4,34,10,18,cl.skin);
      pxR(c,cx0-sw2/2-aw-5,40,14+grab*.5,10,cl.skin);
      break;
    }
    case 'block':{

const gpSt=[null,null],gpPrev=[[],[]],gpConn=[false,false];
const GPB={u:12,d:13,l:14,r:15,a:0,x:2,b:1,y:3,lb:4,rb:5,start:9,back:8};
function pollGP(){
  const raw=navigator.getGamepads?navigator.getGamepads():[];let pi=0;
  for(let i=0;i<raw.length&&pi<2;i++){const g=raw[i];if(!g)continue;gpConn[pi]=true;
    const pr=gpPrev[pi],bt={},jp={};
    for(let b=0;b<g.buttons.length;b++){bt[b]=g.buttons[b].pressed;jp[b]=g.buttons[b].pressed&&!pr[b]}
    const lx=g.axes[0]||0,ly=g.axes[1]||0;
    if(lx<-.4){bt[GPB.l]=true;if(!pr[GPB.l])jp[GPB.l]=true}if(lx>.4){bt[GPB.r]=true;if(!pr[GPB.r])jp[GPB.r]=true}
    if(ly<-.4){bt[GPB.u]=true;if(!pr[GPB.u])jp[GPB.u]=true}if(ly>.4){bt[GPB.d]=true;if(!pr[GPB.d])jp[GPB.d]=true}
    const sv=[];for(let b=0;b<20;b++)sv[b]=bt[b]||false;gpPrev[pi]=sv;gpSt[pi]={bt,jp};pi++}
  for(let i=pi;i<2;i++){gpConn[i]=false;gpSt[i]=null}
}

function atkBox(p){

  if(s==='lightPunch'&&t>=3&&t<=8)return{x:bx,y:p.y-SH+40,w:35,h:16};
  if(s==='heavyPunch'&&t>=5&&t<=12)return{x:bx+(d>0?5:-5),y:p.y-SH+35,w:42,h:20};
  if(s==='lightKick'&&t>=3&&t<=9)return{x:bx,y:p.y-SH+65,w:35,h:14};

  if(s==='jumpKick'&&t>=3&&t<=10)return{x:bx+(d>0?5:-5),y:p.y-SH+50,w:40,h:16};
  if(s==='special'&&t>=6&&t<=10)return{x:bx+(d>0?10:-10),y:p.y-SH+40,w:30,h:20};

function isAtk(s){return['lightPunch','heavyPunch','lightKick','heavyKick','crouchPunch','crouchKick','jumpPunch','jumpKick','special','superMove','throw'].includes(s)}

// === PLAYER UPDATE ===
function updP(idx,inp){
  const p=P[idx],ch=CHARS[p.ci],opp=P[1-idx];
  if(p.cd>0)p.cd--;if(p.scd>0)p.scd--;if(p.inv>0)p.inv--;if(p.ti>0)p.ti--;
  if(p.ct>0){p.ct--;if(p.ct<=0)p.cc=0}
  
  if(p.st==='ko'){p.stt++;return}
  if(p.kd>0){p.kd--;p.st='knockdown';p.stt++;if(p.kd<=0){p.st='idle';p.stt=0;p.inv=20;p.ti=30}return}
  
  // Hitstun
  if(p.hs>0){p.hs--;p.stt++;if(p.hs<=0){p.st='idle';p.stt=0}return}
  if(p.bs>0){p.bs--;if(p.bs<=0&&p.st==='block'&&!inp.block){p.st='idle';p.stt=0}return}
  
  // In attack
  if(isAtk(p.st)){
    p.stt++;
    // Special: spawn projectile at right frame
    if(p.st==='special'&&p.stt===8&&ch.spT==='proj'){
      const d=p.face==='right'?1:-1;
      spawnProj(idx,p.x+d*40,p.y-SH/2,d*7,ch.spD,ch.col.acc);
      SFX.special();
    }
    if(p.st==='special'&&p.stt===8&&ch.spT==='gp'){
      // Ground pound: shake + damage nearby
      shake=10;SFX.hKick();
      const d=Math.abs(opp.x-p.x);
      if(d<120&&opp.gr){
        applyHit(idx,1-idx,ch.spD,20,8);
        for(let i=0;i<10;i++)addP(opp.x+(Math.random()-.5)*40,GY,'#aa6600',20,0,-Math.random()*6,4);
      }
      for(let i=0;i<15;i++)addP(p.x+(Math.random()-.5)*100,GY,'#886622',15,(Math.random()-.5)*4,-Math.random()*5,3);
    }
    if(p.st==='superMove'&&p.stt===20){
      SFX.superMove();shake=15;flash=10;
      superFX(p.x,p.y-SH/2,ch.col.acc);
    }
    if(p.stt>=atkDur(p.st)){p.st='idle';p.stt=0;p.cd=isLight(p.st)?5:10;p.hta=false}
    return;
  }
  
  // Block
  if(inp.block){p.st='block';p.cr=false;p.stt++;return}
  if(p.st==='block'){p.st='idle';p.stt=0}
  
  // Gravity
  if(!p.gr){
    p.vy+=.6*ch.wt;p.y+=p.vy;p.x+=p.vx;
    if(p.y>=GY){p.y=GY;p.vy=0;p.vx=0;p.gr=true;p.cr=false;SFX.land();
      if(p.st==='jumpPunch'||p.st==='jumpKick'||p.st==='jump'||p.st==='jumpUp'||p.st==='jumpFall'){p.st='idle';p.stt=0;p.hta=false}}
    // Aerial attacks
    if(!p.gr&&p.cd<=0){
      if(inp.punch){p.st='jumpPunch';p.stt=0;p.cd=10;p.hta=false;SFX.lPunch();return}
      if(inp.kick){p.st='jumpKick';p.stt=0;p.cd=10;p.hta=false;SFX.lKick();return}
    }
    if(!p.gr){
      p.st=p.vy<0?'jumpUp':'jumpFall';p.stt++;
    }
    return;
  }
  
  // Crouch
  p.cr=inp.down;
  
  // Jump
  if(inp.up&&p.gr){
    p.vy=ch.jp;p.gr=false;p.st='jump';p.stt=0;
    p.vx=inp.left?-3:inp.right?3:0;
    SFX.jump();return;
  }
  
  // Super move
  if(inp.super&&p.super>=p.maxS&&p.cd<=0){
    p.st='superMove';p.stt=0;p.cd=30;p.super=0;p.hta=false;return;
  }
  
  // Special
  if(inp.special&&p.cd<=0&&p.scd<=0){
    p.st='special';p.stt=0;p.cd=20;p.scd=60;p.hta=false;return;
  }
  
  // Throw (forward + punch when close)
  const dist=Math.abs(p.x-opp.x);
  if(inp.punch&&((p.face==='right'&&inp.right)||(p.face==='left'&&inp.left))&&dist<50&&p.cd<=0&&opp.ti<=0&&opp.st!=='block'){
    p.st='throw';p.stt=0;p.cd=20;p.hta=false;SFX.throwSfx();return;
  }
  
  // Attacks (crouching)
  if(p.cr){
    if(inp.punch&&p.cd<=0){p.st='crouchPunch';p.stt=0;p.cd=8;p.hta=false;SFX.lPunch();return}
    if(inp.kick&&p.cd<=0){p.st='crouchKick';p.stt=0;p.cd=10;p.hta=false;SFX.sweep();return}
    p.st='crouch';p.stt++;return;
  }
  
  // Standing attacks
  if(inp.punch&&p.cd<=0){
    // Combo: light -> heavy chain
    if(p.cc>0&&p.ct>0&&isLight(p.st)){p.st='heavyPunch';p.stt=0;p.cd=12;p.hta=false;SFX.hPunch();return}
    p.st='lightPunch';p.stt=0;p.cd=8;p.hta=false;SFX.lPunch();return;
  }
  if(inp.kick&&p.cd<=0){
    if(p.cc>0&&p.ct>0){p.st='heavyKick';p.stt=0;p.cd=12;p.hta=false;SFX.hKick();return}
    p.st='lightKick';p.stt=0;p.cd=8;p.hta=false;SFX.lKick();return;
  }
  
  // Movement
  let moving=false;
  if(inp.left){p.x-=ch.spd;moving=true}
  if(inp.right){p.x+=ch.spd;moving=true}
  
  // Clamp
  p.x=Math.max(AL,Math.min(AR,p.x));
  if(dist<45){if(p.x<opp.x)p.x=opp.x-45;else p.x=opp.x+45;p.x=Math.max(AL,Math.min(AR,p.x))}
  
  // Face opponent
  if(p.st!=='hit'&&p.st!=='ko')p.face=p.x<opp.x?'right':'left';
  
  if(moving){if(p.st!=='walk'){p.st='walk';p.stt=0}p.stt++}
  else{if(p.st==='walk'||p.st==='crouch'){p.st='idle';p.stt=0}p.stt++}
}

function applyHit(atk,def,dmg,hs,kb){
  const a=P[atk],d=P[def];
  d.hp=Math.max(0,d.hp-dmg);
  d.st='hit';d.stt=0;d.hs=hs;d.cr=false;
  // Knockback
  const dir=a.face==='right'?1:-1;
  d.x+=dir*kb;d.x=Math.max(AL,Math.min(AR,d.x));
  // Super meter
  a.super=Math.min(a.maxS,a.super+dmg*1.5);
  d.super=Math.min(d.maxS,d.super+dmg*.8);
  // Combo
  a.cc++;a.ct=30;
  combD[atk]={c:a.cc,t:40};
  // Juggle: if in air, add upward velocity
  if(!d.gr){d.vy=-4;d.vx=dir*2}
  // Sweep knockdown
  if(a.st==='crouchKick'||a.st==='throw'){d.kd=40;d.st='knockdown';d.stt=0;d.hs=0}
  // Launch on super
  if(a.st==='superMove'&&d.gr){d.vy=-10;d.gr=false;d.vx=dir*3}
}

// === AI ===
const AI={
  tt:0,act:null,at:0,rb:0,ls:'idle',
  prof:{easy:{rd:25,bc:.08,ar:.015,sr:.004,as:.5,rc:.05,pc:.05,ti:30},medium:{rd:12,bc:.3,ar:.04,sr:.012,as:.8,rc:.15,pc:.35,ti:15},hard:{rd:4,bc:.6,ar:.07,sr:.025,as:1,rc:.25,pc:.75,ti:6}},
  gp(){return this.prof[['easy','medium','hard'][cpuDiff]]||this.prof.medium},
  reset(){this.tt=0;this.act=null;this.at=0;this.rb=0;this.ls='idle'},
  update(cpu,hum){
    const pr=this.gp();
    const inp={left:false,right:false,up:false,upH:false,down:false,punch:false,kick:false,special:false,super:false,block:false};
    if(cpu.hs>0||cpu.bs>0||cpu.st==='ko'||cpu.kd>0)return inp;
    if(isAtk(cpu.st))return inp;
    
    const dist=Math.abs(cpu.x-hum.x);
    const isL=cpu.x<hum.x;
    const aRange=65;
    
    if(hum.st!==this.ls){this.rb=pr.rd;this.ls=hum.st}
    if(this.rb>0)this.rb--;
    
    this.tt--;
    if(this.tt<=0){this.tt=pr.ti+(Math.random()*8|0);this.decide(cpu,hum,pr,dist,aRange,isL)}
    
    if(this.act){
      this.at--;
      switch(this.act.type){
        case'approach':if(isL)inp.right=true;else inp.left=true;
          if(dist<aRange&&cpu.cd<=0&&Math.random()<pr.ar*3)this.pickAtk(inp,cpu,pr,dist);break;
        case'retreat':if(isL)inp.left=true;else inp.right=true;break;
        case'attack':this.pickAtk(inp,cpu,pr,dist);this.act=null;break;
        case'block':inp.block=true;break;
        case'jump':inp.up=true;this.act=null;break;
        case'crouch':inp.down=true;if(Math.random()<.1)inp.kick=true;break;
      }
      if(this.at<=0)this.act=null;
    }
    
    // Reactive block
    if(this.rb<=0){
      const oa=isAtk(hum.st);
      if(oa&&dist<aRange+20&&Math.random()<pr.bc){inp.block=true;inp.left=inp.right=inp.punch=inp.kick=false}
      // Punish
      if(hum.st==='idle'&&['lightPunch','heavyPunch','lightKick','heavyKick','special'].includes(this.ls)&&dist<aRange&&Math.random()<pr.pc&&cpu.cd<=0){
        inp.block=false;this.pickAtk(inp,cpu,pr,dist);
      }
    }
    
    // Use super when available
    if(cpu.super>=cpu.maxS&&dist<100&&Math.random()<.02)inp.super=true;
    
    return inp;
  },
  decide(cpu,hum,pr,dist,ar,isL){
    const r=Math.random();
    if(r<.15){this.act={type:Math.random()<.5?'approach':'retreat'};this.at=15+Math.random()*20|0;return}
    if(isAtk(hum.st)&&dist<ar+30&&Math.random()<pr.bc*2){this.act={type:'block'};this.at=15;return}
    if(dist>ar+30){this.act={type:'approach'};this.at=20+Math.random()*15|0;return}
    if(dist<ar){
      if(Math.random()<pr.ar*10){this.act={type:'attack'};this.at=5;return}
      if(Math.random()<pr.rc){this.act={type:'retreat'};this.at=15;return}
      if(Math.random()<.1){this.act={type:'jump'};this.at=5;return}
    }
    this.act={type:'approach'};this.at=10;
  },
  pickAtk(inp,cpu,pr,dist){
    if(cpu.cd>0)return;
    if(cpu.scd<=0&&Math.random()<pr.sr*15&&dist<120){inp.special=true;return}
    if(Math.random()<.3&&dist<60){inp.down=true;inp.kick=true;return}
    if(Math.random()<.55)inp.punch=true;else inp.kick=true;
  }
};

// === FIGHT LOGIC ===
function startFight(){P[0].wins=0;P[1].wins=0;rn=1;AI.reset();resetRound()}
function resetRound(){
  P[0].x=200;P[1].x=W-200;
  for(let i=0;i<2;i++){const p=P[i];p.y=GY;p.hp=100;p.st='idle';p.stt=0;p.face=i===0?'right':'left';
    p.vy=0;p.vx=0;p.cd=0;p.hs=0;p.bs=0;p.scd=0;p.gr=true;p.cr=false;p.cc=0;p.ct=0;p.kd=0;p.inv=0;p.hta=false;p.ti=0}
  rt=99;rtt=0;rs='announce';rat=150;winner=-1;
  projs=[];parts=[];camX=0;
  SFX.roundAnnounce();Ann.round(rn);
}

function endRound(w){
  rs='ko';winner=w;rat=180;stopMusic();SFX.ko();flash=15;shake=12;
  const isPerfect=w>=0&&P[w].hp>=100;
  if(isPerfect){Ann.perfect();SFX.ko()}else Ann.ko();
  if(w>=0){const l=P[1-w];for(let i=0;i<20;i++)addP(l.x+Math.random()*40-20,l.y-SH/2+Math.random()*40-20,i%2?'#ff4444':'#ffcc00',40)}
}

function updFight(){
  if(rs==='announce'){
    rat--;
    if(rat===50){SFX.fight();Ann.fight()}
    if(rat<=0){rs='fight';playFightMusic(selStage)}
    return;
  }
  if(rs==='ko'){
    rat--;P.forEach(p=>{if(p.st==='ko')p.stt++});updParts();
    if(rat<=0){
      if(winner>=0){P[winner].wins++;if(P[winner].wins>=2){mw=winner;gs='matchEnd';stopMusic();SFX.win();if(mw===0||gMode==='pvp')Ann.youWin();return}}
      rn++;resetRound();
    }
    return;
  }
  
  // Timer
  rtt++;if(rtt>=60){rtt=0;rt--;if(rt<=0){Ann.timeUp();if(P[0].hp>P[1].hp)endRound(0);else if(P[1].hp>P[0].hp)endRound(1);else endRound(-1);return}}
  
  // Input
  const g0=gpi(0),g1=gpi(1);
  
  // Pause
  if(ck('Escape')||(g0&&g0.start)){paused=!paused;pauseIdx=0;return}
  if(paused)return;
  
  // P1 input
  const inp0={
    left:keys['KeyA']||(g0&&g0.left),right:keys['KeyD']||(g0&&g0.right),
    up:ck('KeyW')||(g0&&g0.up),down:keys['KeyS']||(g0&&g0.down),
    punch:ck('KeyF')||ck('KeyG')||(g0&&g0.punch),kick:ck('KeyH')||ck('KeyJ')||(g0&&g0.kick),
    special:ck('KeyR')||(g0&&g0.special),super:ck('KeyY')||(g0&&g0.super),
    block:keys['KeyT']||(g0&&g0.block)
  };
  updP(0,inp0);
  
  // P2 / AI
  if(gMode==='cpu'){
    const aiInp=AI.update(P[1],P[0]);
    updP(1,aiInp);
  } else {
    const inp1={
      left:keys['ArrowLeft']||(g1&&g1.left),right:keys['ArrowRight']||(g1&&g1.right),
      up:ck('ArrowUp')||(g1&&g1.up),down:keys['ArrowDown']||(g1&&g1.down),
      punch:ck('Numpad1')||ck('Numpad2')||(g1&&g1.punch),kick:ck('Numpad4')||ck('Numpad5')||(g1&&g1.kick),
      special:ck('Numpad3')||(g1&&g1.special),super:ck('Numpad0')||(g1&&g1.super),
      block:keys['Numpad6']||(g1&&g1.block)
    };
    updP(1,inp1);
  }
  
  // Face each other
  for(let i=0;i<2;i++){const p=P[i];if(p.st!=='hit'&&p.st!=='ko'&&p.st!=='knockdown'&&p.gr)p.face=p.x<P[1-i].x?'right':'left'}
  
  // Hit detection
  for(let a=0;a<2;a++){
    const b=1-a,atk=P[a],def=P[b];
    if(atk.hta)continue;
    const ab=atkBox(atk),hb=hurtBox(def);
    if(bOlap(ab,hb)){
      atk.hta=true;
      let dmg=atkDmg(atk);
      const isSpec=atk.st==='special'||atk.st==='superMove';
      
      if(def.st==='block'){
        // Blocked
        const chip=isSpec?Math.max(1,dmg*.2|0):0;
        def.hp=Math.max(0,def.hp-chip);
        def.bs=10;SFX.block();shake=3;
        for(let i=0;i<5;i++)addP(ab.x+ab.w/2,ab.y,'#88ccff',12,(Math.random()-.5)*3,-Math.random()*2,3);
        def.super=Math.min(def.maxS,def.super+3);
      } else {
        const hs2=atkHS(atk.st);
        const kb2=isSpec?10:atk.st==='heavyPunch'||atk.st==='heavyKick'?7:4;
        applyHit(a,b,dmg,hs2,kb2);
        
        if(isLight(atk.st))SFX.lPunch();else if(atk.st==='heavyPunch')SFX.hPunch();
        else if(atk.st==='heavyKick')SFX.hKick();else if(isSpec)SFX.special();
        
        shake=isSpec?10:atk.st.includes('heavy')?7:4;
        hitFX(ab.x+ab.w/2,ab.y,!isLight(atk.st));
      }
      
      if(def.hp<=0){def.st='ko';def.stt=0;endRound(a);return}
    }
  }
  
  // Projectiles
  projs.forEach(pr=>{
    pr.x+=pr.vx;pr.life--;
    const def=P[1-pr.own];
    const hb=hurtBox(def);
    if(bOlap({x:pr.x-pr.sz/2,y:pr.y-pr.sz/2,w:pr.sz,h:pr.sz},hb)){
      if(def.st==='block'){def.bs=10;SFX.block();pr.life=0;const chip=Math.max(1,pr.dmg*.2|0);def.hp=Math.max(0,def.hp-chip)}
      else{
        applyHit(pr.own,1-pr.own,pr.dmg,12,5);
        SFX.lPunch();shake=4;pr.life=0;
        hitFX(pr.x,pr.y,false);
        if(def.hp<=0){def.st='ko';def.stt=0;endRound(pr.own)}
      }
    }
  });
  projs=projs.filter(p=>p.life>0&&p.x>-30&&p.x<W+30);
  
  // Gravity for players
  for(let i=0;i<2;i++){
    const p=P[i];
    if(!p.gr&&!isAtk(p.st)&&p.st!=='ko'&&p.st!=='knockdown'&&p.hs<=0){
      p.vy+=.6*CHARS[p.ci].wt;p.y+=p.vy;p.x+=p.vx;
      if(p.y>=GY){p.y=GY;p.vy=0;p.vx=0;p.gr=true;if(!isAtk(p.st)){p.st='idle';p.stt=0}}
    }
  }
  
  updParts();
  
  // Camera
  const midX=(P[0].x+P[1].x)/2;
  camX=(midX-W/2)*.3;
  
  if(shake>0)shake*=.85;if(shake<.5)shake=0;
  
  // Combo display timer
  for(let i=0;i<2;i++)if(combD[i].t>0)combD[i].t--;
}

function drawFight(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*2);
  
  const stage=STAGES[selStage];
  stage.drawBG(ctx,W,H,fc,camX);
  stage.drawMid(ctx,W,H,fc,camX);
  
  if(flash>0){ctx.globalAlpha=flash/15*.5;pxR(ctx,0,0,W,H,'#fff');ctx.globalAlpha=1;flash--}
  
  // Draw shadows
  for(let i=0;i<2;i++){
    const p=P[i];ctx.globalAlpha=.3;ctx.fillStyle='#000';
    ctx.beginPath();ctx.ellipse(p.x-camX*.5,GY+2,24,5,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }
  
  // Draw projectiles
  projs.forEach(pr=>{
    pxC(ctx,pr.x-camX*.5,pr.y,pr.sz/2+Math.sin(fc*.3)*2,pr.col);
    pxC(ctx,pr.x-camX*.5,pr.y,pr.sz/4,'#fff');
    // Trail
    for(let t=1;t<=3;t++){ctx.globalAlpha=.3-t*.1;pxC(ctx,pr.x-pr.vx*t*2-camX*.5,pr.y,pr.sz/3,pr.col)}
    ctx.globalAlpha=1;
  });
  
  // Draw players
  for(let i=0;i<2;i++){
    const p=P[i];
    const sprite=getSprite(p.ci,p.st,p.stt,p.face);
    const dx=p.x-SW/2-camX*.5;
    const dy=p.y-SH;
    
    // Invincibility flash
    if(p.inv>0&&fc%4<2)ctx.globalAlpha=.5;
    ctx.drawImage(sprite,dx,dy,SW,SH);
    ctx.globalAlpha=1;
    
    // Super aura when charged
    if(p.super>=p.maxS){
      ctx.globalAlpha=.2+Math.sin(fc*.15)*.1;
      pxC(ctx,p.x-camX*.5,p.y-SH/2,35+Math.sin(fc*.1)*5,CHARS[p.ci].col.acc);
      ctx.globalAlpha=1;
    }
  }
  
  stage.drawFG(ctx,W,H,fc,camX);
  drawParts();
  ctx.restore();
  
  // === HUD ===
  drawHUD();
  
  // Combo display
  for(let i=0;i<2;i++){
    if(combD[i].t>0&&combD[i].c>1){
      const x=i===0?120:W-180;
      ctx.globalAlpha=combD[i].t/40;
      ctx.font='bold 20px monospace';ctx.fillStyle='#ffcc00';ctx.textAlign='center';
      ctx.fillText(`${combD[i].c} HIT COMBO!`,x,H/2);
      ctx.textAlign='left';ctx.globalAlpha=1;
    }
  }
  
  // Round announce
  if(rs==='announce'){
    pxR(ctx,0,H/2-50,W,100,'rgba(0,0,0,.6)');
    ctx.textAlign='center';
    if(rat>50){ctx.font='bold 40px monospace';ctx.fillStyle='#ffcc00';ctx.fillText(`ROUND ${rn}`,W/2,H/2+10)}
    else{ctx.font='bold 48px monospace';ctx.fillStyle='#ff4444';ctx.fillText('FIGHT!',W/2,H/2+12)}
    ctx.textAlign='left';
  }
  
  // KO text
  if(rs==='ko'){
    const isPerfect=winner>=0&&P[winner].hp>=100;
    ctx.textAlign='center';
    // Big dramatic KO
    const koScale=1+Math.sin(fc*.15)*.1;
    ctx.save();ctx.translate(W/2,H/2);ctx.scale(koScale,koScale);
    ctx.font='bold 64px monospace';
    ctx.fillStyle='#000';ctx.fillText(isPerfect?'PERFECT!':'K.O.!',3,3);
    ctx.fillStyle=isPerfect?'#ffcc00':'#ff0000';ctx.fillText(isPerfect?'PERFECT!':'K.O.!',0,0);
    ctx.restore();
    
    if(winner>=0&&rat<120){
      ctx.font='18px monospace';ctx.fillStyle='#ffcc00';
      ctx.fillText(`${CHARS[P[winner].ci].name} WINS!`,W/2,H/2+50);
    }
    ctx.textAlign='left';
  }
  
  // Pause
  if(paused){
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.font='bold 32px monospace';ctx.fillStyle='#ffcc00';ctx.fillText('PAUSED',W/2,H/2-40);
    const items=['RESUME','QUIT TO MENU'];
    items.forEach((it,i)=>{
      ctx.font='bold 16px monospace';
      ctx.fillStyle=pauseIdx===i?'#fff':'#666';
      ctx.fillText(it,W/2,H/2+i*30);
    });
    ctx.textAlign='left';
    
    // Pause input
    if(ck('KeyW')||ck('ArrowUp'))pauseIdx=Math.max(0,pauseIdx-1);
    if(ck('KeyS')||ck('ArrowDown'))pauseIdx=Math.min(1,pauseIdx+1);
    if(ck('Enter')||ck('KeyF')){
      if(pauseIdx===0)paused=false;
      else{paused=false;gs='title';stopMusic()}
    }
  }
}

function drawHUD(){
  // Health bars — SF2 style
  const barW=280,barH=22,barY=15;
  
  // P1 health (left-aligned, drains right to left)
  ctx.fillStyle='#111';ctx.fillRect(80,barY,barW,barH);
  const hp1=P[0].hp/P[0].mhp;
  const hc1=hp1>.5?'#00cc44':hp1>.25?'#cccc00':'#cc0000';
  ctx.fillStyle=hc1;ctx.fillRect(80,barY,barW*hp1,barH);
  // Yellow drain effect
  ctx.fillStyle='#333';ctx.fillRect(80+barW*hp1,barY,barW*(1-hp1),barH);
  
  // P2 health (right-aligned, drains left to right)
  ctx.fillStyle='#111';ctx.fillRect(W-80-barW,barY,barW,barH);
  const hp2=P[1].hp/P[1].mhp;
  const hc2=hp2>.5?'#00cc44':hp2>.25?'#cccc00':'#cc0000';
  ctx.fillStyle=hc2;ctx.fillRect(W-80-barW*hp2,barY,barW*hp2,barH);
  ctx.fillStyle='#333';ctx.fillRect(W-80-barW,barY,barW*(1-hp2),barH);
  
  // Health bar borders

function updateModeSelect(){
  if(msCd>0){msCd--;return}
  const g0=gpi(0),g1=gpi(1);
  const aC=ck('Enter')||ck('Space')||ck('KeyF')||ck('KeyG')||(g0&&g0.confirm)||(g1&&g1.confirm);
  const aL=keys['KeyA']||keys['ArrowLeft']||(g0&&g0.mL)||(g1&&g1.mL);
  const aR=keys['KeyD']||keys['ArrowRight']||(g0&&g0.mR)||(g1&&g1.mR);
  const aB=ck('Escape')||(g0&&g0.back)||(g1&&g1.back);
  
  if(msPh===0){
    if(aL||aR){msIdx=msIdx===0?1:0;msCd=10;SFX.menuMove();keys['KeyA']=keys['KeyD']=keys['ArrowLeft']=keys['ArrowRight']=false}
    if(aC){SFX.select();if(msIdx===0){gMode='pvp';gs='vsScreen';vst=120;stopMusic()}else{msPh=1;msCd=10}}
    if(aB){gs='charSelect';P[0].conf=P[1].conf=false}
  }else{
    if(aL){dsIdx=Math.max(0,dsIdx-1);msCd=10;SFX.menuMove();keys['KeyA']=keys['ArrowLeft']=false}
    if(aR){dsIdx=Math.min(2,dsIdx+1);msCd=10;SFX.menuMove();keys['KeyD']=keys['ArrowRight']=false}
    if(aC){SFX.select();gMode='cpu';cpuDiff=dsIdx;AI.reset();gs='vsScreen';vst=120;stopMusic()}
    if(aB){msPh=0;msCd=10}
  }
}

// === GAME LOOP ===
function update(){
  fc++;pollGP();
  switch(gs){
    case'title':updateTitle();break;
    case'charSelect':updateCharSelect();break;
    case'modeSelect':updateModeSelect();break;
    case'vsScreen':break;
    case'fight':updFight();break;
    case'matchEnd':{
      const g0=gpi(0),g1=gpi(1);
      if(ck('Enter')||ck('Space')||(g0&&g0.confirm)||(g1&&g1.confirm)){gs='vsScreen';vst=120;stopMusic()}
      if(ck('Escape')||(g0&&g0.back)||(g1&&g1.back)){gs='charSelect';P[0].conf=P[1].conf=false;playMenuMusic()}
      break;
    }
  }
  // Clear just-pressed
  for(const k in jp2)jp2[k]=false;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  switch(gs){
    case'title':drawTitle();break;
    case'charSelect':drawCharSelect();break;
    case'modeSelect':drawModeSelect();break;
    case'vsScreen':drawVsScreen();break;
    case'fight':drawFight();break;
    case'matchEnd':drawMatchEnd();break;
  }
  // Scanlines
  ctx.globalAlpha=.03;for(let y=0;y<H;y+=2){ctx.fillStyle='#000';ctx.fillRect(0,y,W,1)}ctx.globalAlpha=1;
}

function loop(){update();draw();requestAnimationFrame(loop)}

const isTouchDevice=('ontouchstart' in window)||navigator.maxTouchPoints>0;

// Touch input state (mirrors keyboard/gamepad)
const touchIn={left:false,right:false,up:false,down:false,punch:false,kick:false,special:false,super:false,block:false,confirm:false,start:false,back:false};
const touchJP={up:false,punch:false,kick:false,special:false,super:false,confirm:false,start:false,back:false}; // just-pressed

if(isTouchDevice){
  const overlay=document.getElementById('touch-overlay');
  overlay.classList.add('active');

  // --- Landscape prompt ---
  const lp=document.getElementById('landscape-prompt');
  function checkOrientation(){
    const isPortrait=window.innerHeight>window.innerWidth;
    lp.classList.toggle('show',isPortrait);
  }
  checkOrientation();
  window.addEventListener('resize',checkOrientation);
  window.addEventListener('orientationchange',()=>setTimeout(checkOrientation,100));

  // --- Better responsive canvas for mobile ---
  const origResize=resize;
  resize=function(){
    const s=Math.min(innerWidth/W,innerHeight/H);
    canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px';
  };
  resize();

  // --- Build touch UI ---
  // Helper to create a button element
  function mkBtn(id,label,color,size,extra){
    const b=document.createElement('div');
    b.id=id;b.textContent=label;
    Object.assign(b.style,{
      position:'absolute',width:size+'px',height:size+'px',borderRadius:'50%',
      background:color,border:'2px solid rgba(255,255,255,.4)',
      display:'flex',alignItems:'center',justifyContent:'center',
      fontFamily:'monospace',fontWeight:'bold',fontSize:(size*.33|0)+'px',
      color:'#fff',opacity:'.55',transition:'transform .08s,opacity .08s,box-shadow .08s',
      WebkitTapHighlightColor:'transparent',touchAction:'none'
    },...(extra?[extra]:[])
    );
    return b;
  }

  // D-Pad container (bottom-left)
  const dpad=document.createElement('div');
  Object.assign(dpad.style,{position:'absolute',bottom:'20px',left:'16px',width:'130px',height:'130px'});
  
  const dpadBtns=[
    {id:'dp-up',label:'▲',dir:'up',x:42,y:0},
    {id:'dp-down',label:'▼',dir:'down',x:42,y:86},
    {id:'dp-left',label:'◀',dir:'left',x:0,y:42},
    {id:'dp-right',label:'▶',dir:'right',x:86,y:42}
  ];
  dpadBtns.forEach(d=>{
    const b=mkBtn(d.id,d.label,'rgba(255,255,255,.18)',44);
    b.style.left=d.x+'px';b.style.top=d.y+'px';b.style.fontSize='18px';
    b.dataset.dir=d.dir;
    dpad.appendChild(b);
  });
  // Center circle
  const dCenter=document.createElement('div');
  Object.assign(dCenter.style,{position:'absolute',left:'46px',top:'46px',width:'38px',height:'38px',borderRadius:'50%',background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.15)'});
  dpad.appendChild(dCenter);
  overlay.appendChild(dpad);

  // Action buttons (bottom-right) — diamond layout
  const actCont=document.createElement('div');
  Object.assign(actCont.style,{position:'absolute',bottom:'20px',right:'16px',width:'150px',height:'140px'});
  
  const actBtns=[
    {id:'btn-a',label:'A',color:'rgba(66,133,244,.65)',action:'punch',x:50,y:80},   // bottom-center-left
    {id:'btn-b',label:'B',color:'rgba(234,67,53,.65)',action:'kick',x:100,y:44},    // right
    {id:'btn-x',label:'X',color:'rgba(52,168,83,.65)',action:'special',x:0,y:44},   // left
    {id:'btn-y',label:'Y',color:'rgba(251,188,4,.65)',action:'block',x:50,y:8}      // top
  ];
  actBtns.forEach(a=>{
    const b=mkBtn(a.id,a.label,a.color,56);
    b.style.left=a.x+'px';b.style.top=a.y+'px';
    b.dataset.action=a.action;
    actCont.appendChild(b);
  });
  overlay.appendChild(actCont);

  // Super button — small, near action buttons
  const superBtn=mkBtn('btn-super','S','rgba(200,0,200,.4)',40);
  Object.assign(superBtn.style,{position:'absolute',bottom:'166px',right:'130px',fontSize:'13px'});
  superBtn.dataset.action='super';
  overlay.appendChild(superBtn);

  // Start/Pause button — top-right
  const startBtn=mkBtn('btn-start','▶❚❚','rgba(255,255,255,.2)',38);
  Object.assign(startBtn.style,{position:'absolute',top:'10px',right:'10px',fontSize:'10px',borderRadius:'6px',width:'48px',height:'32px'});
  startBtn.dataset.action='start';
  overlay.appendChild(startBtn);

  // --- Super button glow logic (updated in draw loop) ---
  let superGlowInt=setInterval(()=>{
    if(gs==='fight'&&P[0].super>=P[0].maxS){
      superBtn.style.opacity='.9';
      superBtn.style.boxShadow='0 0 16px 4px rgba(255,0,255,.7)';
      superBtn.style.background='rgba(255,0,255,.7)';
    } else {
      superBtn.style.opacity='.45';
      superBtn.style.boxShadow='none';
      superBtn.style.background='rgba(200,0,200,.4)';
    }
  },200);

  // --- Multi-touch handler ---
  const activeTouches=new Map(); // touchId -> {element, action/dir}

  function pressEffect(el){el.style.transform='scale(1.18)';el.style.opacity='.85';el.style.boxShadow='0 0 12px 2px rgba(255,255,255,.5)'}
  function releaseEffect(el){el.style.transform='scale(1)';el.style.opacity='.55';el.style.boxShadow='none'}

  function identifyTouch(el){
    if(!el||!el.dataset)return null;
    if(el.dataset.dir)return{type:'dir',val:el.dataset.dir,el};
    if(el.dataset.action)return{type:'action',val:el.dataset.action,el};
    // Check parent
    if(el.parentElement&&el.parentElement.dataset){
      if(el.parentElement.dataset.dir)return{type:'dir',val:el.parentElement.dataset.dir,el:el.parentElement};
      if(el.parentElement.dataset.action)return{type:'action',val:el.parentElement.dataset.action,el:el.parentElement};
    }
    return null;
  }

  function applyTouch(info,pressed){
    if(!info)return;
    if(info.type==='dir'){
      touchIn[info.val]=pressed;
      if(pressed&&(info.val==='up'))touchJP.up=true;
    }
    if(info.type==='action'){
      const v=info.val;
      if(v==='start'){
        if(pressed)touchJP.start=true;
        touchIn.start=pressed;
      } else {
        touchIn[v]=pressed;
        if(pressed)touchJP[v]=true;
        // confirm = punch or start
        if(v==='punch'&&pressed)touchJP.confirm=true;
      }
    }
    if(pressed)pressEffect(info.el);else releaseEffect(info.el);
  }

  function handleTouchStart(e){
    e.preventDefault();ea();
    for(const t of e.changedTouches){
      const info=identifyTouch(t.target);
      if(info){activeTouches.set(t.identifier,info);applyTouch(info,true)}
      // Tap anywhere on canvas = confirm for title/matchEnd
      if(t.target===canvas){touchJP.confirm=true}
    }
  }
  function handleTouchEnd(e){
    e.preventDefault();
    for(const t of e.changedTouches){
      const info=activeTouches.get(t.identifier);
      if(info){applyTouch(info,false);activeTouches.delete(t.identifier)}
    }
  }
  function handleTouchMove(e){
    e.preventDefault();
    // For d-pad: check if finger moved to a different button
    for(const t of e.changedTouches){
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const newInfo=identifyTouch(el);
      const oldInfo=activeTouches.get(t.identifier);
      if(oldInfo&&newInfo&&(oldInfo.val!==newInfo.val||oldInfo.type!==newInfo.type)){
        applyTouch(oldInfo,false);
        applyTouch(newInfo,true);
        activeTouches.set(t.identifier,newInfo);
      } else if(oldInfo&&!newInfo){
        applyTouch(oldInfo,false);
        activeTouches.delete(t.identifier);
      }
    }
  }

  overlay.addEventListener('touchstart',handleTouchStart,{passive:false});
  overlay.addEventListener('touchend',handleTouchEnd,{passive:false});
  overlay.addEventListener('touchcancel',handleTouchEnd,{passive:false});
  overlay.addEventListener('touchmove',handleTouchMove,{passive:false});
  // Also capture taps on the canvas itself (for title screen etc)
  canvas.addEventListener('touchstart',e=>{e.preventDefault();ea();touchJP.confirm=true},{passive:false});
  canvas.addEventListener('touchend',e=>e.preventDefault(),{passive:false});
  canvas.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

  // Prevent all default touch on body
  document.body.addEventListener('touchstart',e=>{if(e.target!==canvas&&!overlay.contains(e.target))e.preventDefault()},{passive:false});
  document.body.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
}

// === INJECT TOUCH INTO INPUT SYSTEM ===
// Patch updateTitle to accept touch confirm
const origUpdateTitle=updateTitle;
updateTitle=function(){
  tb++;const g0=gpi(0),g1=gpi(1);
  if(ck('Enter')||ck('Space')||touchJP.confirm||(g0&&g0.confirm)||(g1&&g1.confirm)){
    gs='charSelect';P[0].conf=P[1].conf=false;P[0].ci=0;P[1].ci=1;selStage=0;SFX.select();playMenuMusic();
    touchJP.confirm=false;
  }
};

// Patch char select to accept touch
const origUpdateCharSelect=updateCharSelect;
updateCharSelect=function(){
  const g0=gpi(0),g1=gpi(1);
  for(let p=0;p<2;p++){
    if(P[p].conf)continue;
    // Only P1 gets touch controls
    if(p===0){
      if(csCd[p]>0){csCd[p]--;continue}
      const kL=keys['KeyA']||touchIn.left;const kR=keys['KeyD']||touchIn.right;
      const kU=keys['KeyW']||touchIn.up;const kD=keys['KeyS']||touchIn.down;
      const gp=g0;
      if(kL||kR||(gp&&gp.mL)||(gp&&gp.mR)){P[p].ci=(P[p].ci+((kR||(gp&&gp.mR))?1:-1)+4)%4;csCd[p]=10;SFX.menuMove()}
      if(kU||kD||(gp&&gp.mU)||(gp&&gp.mD)){selStage=(selStage+((kD||(gp&&gp.mD))?1:-1)+4)%4;csCd[p]=10;SFX.menuMove()}
      const conf=ck('KeyF')||ck('KeyG')||touchJP.confirm||touchJP.punch;
      if(conf||(gp&&gp.confirm)){P[p].conf=true;SFX.select();touchJP.confirm=false;touchJP.punch=false}
    } else {
      if(csCd[p]>0){csCd[p]--;continue}
      const kL=keys['ArrowLeft'];const kR=keys['ArrowRight'];
      const kU=keys['ArrowUp'];const kD=keys['ArrowDown'];
      const gp=g1;
      // On touch device with no P2 input: auto-confirm P2 after P1 confirms
      if(isTouchDevice&&P[0].conf&&!gp){P[p].conf=true;SFX.select();continue}
      if(kL||kR||(gp&&gp.mL)||(gp&&gp.mR)){P[p].ci=(P[p].ci+((kR||(gp&&gp.mR))?1:-1)+4)%4;csCd[p]=10;SFX.menuMove()}
      if(kU||kD||(gp&&gp.mU)||(gp&&gp.mD)){selStage=(selStage+((kD||(gp&&gp.mD))?1:-1)+4)%4;csCd[p]=10;SFX.menuMove()}
      const conf=ck('Digit1')||ck('Digit2')||ck('Numpad1')||ck('Numpad2')||ck('KeyK');
      if(conf||(gp&&gp.confirm)){P[p].conf=true;SFX.select()}
    }
  }
  if(P[0].conf&&P[1].conf){gs='modeSelect';msIdx=isTouchDevice?1:0;dsIdx=1;msPh=0;msCd=12}
};

// Patch mode select to accept touch
const origUpdateModeSelect=updateModeSelect;
updateModeSelect=function(){
  if(msCd>0){msCd--;return}
  const g0=gpi(0),g1=gpi(1);
  const aC=ck('Enter')||ck('Space')||ck('KeyF')||ck('KeyG')||touchJP.confirm||touchJP.punch||(g0&&g0.confirm)||(g1&&g1.confirm);
  const aL=keys['KeyA']||keys['ArrowLeft']||touchIn.left||(g0&&g0.mL)||(g1&&g1.mL);
  const aR=keys['KeyD']||keys['ArrowRight']||touchIn.right||(g0&&g0.mR)||(g1&&g1.mR);
  const aB=ck('Escape')||touchJP.back||(g0&&g0.back)||(g1&&g1.back);
  
  if(msPh===0){
    if(aL||aR){msIdx=msIdx===0?1:0;msCd=10;SFX.menuMove();keys['KeyA']=keys['KeyD']=keys['ArrowLeft']=keys['ArrowRight']=false;touchIn.left=touchIn.right=false}
    if(aC){SFX.select();touchJP.confirm=touchJP.punch=false;if(msIdx===0){gMode='pvp';gs='vsScreen';vst=120;stopMusic()}else{msPh=1;msCd=10}}
    if(aB){gs='charSelect';P[0].conf=P[1].conf=false;touchJP.back=false}
  }else{
    if(aL){dsIdx=Math.max(0,dsIdx-1);msCd=10;SFX.menuMove();keys['KeyA']=keys['ArrowLeft']=false;touchIn.left=false}
    if(aR){dsIdx=Math.min(2,dsIdx+1);msCd=10;SFX.menuMove();keys['KeyD']=keys['ArrowRight']=false;touchIn.right=false}
    if(aC){SFX.select();touchJP.confirm=touchJP.punch=false;gMode='cpu';cpuDiff=dsIdx;AI.reset();gs='vsScreen';vst=120;stopMusic()}
    if(aB){msPh=0;msCd=10;touchJP.back=false}
  }
};

// Patch fight input to include touch (P1 only)
const origUpdFight=updFight;
updFight=function(){
  if(rs==='announce'){
    rat--;
    if(rat===50){SFX.fight();Ann.fight()}
    if(rat<=0){rs='fight';playFightMusic(selStage)}
    return;
  }
  if(rs==='ko'){
    rat--;P.forEach(p=>{if(p.st==='ko')p.stt++});updParts();
    if(rat<=0){
      if(winner>=0){P[winner].wins++;if(P[winner].wins>=2){mw=winner;gs='matchEnd';stopMusic();SFX.win();if(mw===0||gMode==='pvp')Ann.youWin();return}}
      rn++;resetRound();
    }
    return;
  }
  
  rtt++;if(rtt>=60){rtt=0;rt--;if(rt<=0){Ann.timeUp();if(P[0].hp>P[1].hp)endRound(0);else if(P[1].hp>P[0].hp)endRound(1);else endRound(-1);return}}
  
  const g0=gpi(0),g1=gpi(1);
  
  // Pause — touch start button or Escape
  if(ck('Escape')||touchJP.start||(g0&&g0.start)){paused=!paused;pauseIdx=0;touchJP.start=false;return}
  if(paused){
    // Touch pause menu handling
    if(ck('KeyW')||ck('ArrowUp')||touchJP.up)pauseIdx=Math.max(0,pauseIdx-1);
    if(ck('KeyS')||ck('ArrowDown')||touchIn.down&&touchJP.down)pauseIdx=Math.min(1,pauseIdx+1);
    if(ck('Enter')||ck('KeyF')||touchJP.confirm||touchJP.punch){
      touchJP.confirm=touchJP.punch=false;
      if(pauseIdx===0)paused=false;
      else{paused=false;gs='title';stopMusic()}
    }
    return;
  }
  
  // P1 input — include touch
  const inp0={
    left:keys['KeyA']||touchIn.left||(g0&&g0.left),
    right:keys['KeyD']||touchIn.right||(g0&&g0.right),
    up:ck('KeyW')||touchJP.up||(g0&&g0.up),
    down:keys['KeyS']||touchIn.down||(g0&&g0.down),
    punch:ck('KeyF')||ck('KeyG')||touchJP.punch||(g0&&g0.punch),
    kick:ck('KeyH')||ck('KeyJ')||touchJP.kick||(g0&&g0.kick),
    special:ck('KeyR')||touchJP.special||(g0&&g0.special),
    super:ck('KeyY')||touchJP.super||(g0&&g0.super),
    block:keys['KeyT']||touchIn.block||(g0&&g0.block)
  };
  updP(0,inp0);
  
  if(gMode==='cpu'){
    const aiInp=AI.update(P[1],P[0]);
    updP(1,aiInp);
  } else {
    const inp1={
      left:keys['ArrowLeft']||(g1&&g1.left),right:keys['ArrowRight']||(g1&&g1.right),
      up:ck('ArrowUp')||(g1&&g1.up),down:keys['ArrowDown']||(g1&&g1.down),
      punch:ck('Numpad1')||ck('Numpad2')||(g1&&g1.punch),kick:ck('Numpad4')||ck('Numpad5')||(g1&&g1.kick),
      special:ck('Numpad3')||(g1&&g1.special),super:ck('Numpad0')||(g1&&g1.super),
      block:keys['Numpad6']||(g1&&g1.block)
    };
    updP(1,inp1);
  }
  
  for(let i=0;i<2;i++){const p=P[i];if(p.st!=='hit'&&p.st!=='ko'&&p.st!=='knockdown'&&p.gr)p.face=p.x<P[1-i].x?'right':'left'}
  
  for(let a=0;a<2;a++){
    const b=1-a,atk=P[a],def=P[b];
    if(atk.hta)continue;
    const ab=atkBox(atk),hb=hurtBox(def);
    if(bOlap(ab,hb)){
      atk.hta=true;let dmg=atkDmg(atk);const isSpec=atk.st==='special'||atk.st==='superMove';
      if(def.st==='block'){
        const chip=isSpec?Math.max(1,dmg*.2|0):0;def.hp=Math.max(0,def.hp-chip);def.bs=10;SFX.block();shake=3;
        for(let i=0;i<5;i++)addP(ab.x+ab.w/2,ab.y,'#88ccff',12,(Math.random()-.5)*3,-Math.random()*2,3);def.super=Math.min(def.maxS,def.super+3);
      } else {
        const hs2=atkHS(atk.st);const kb2=isSpec?10:atk.st==='heavyPunch'||atk.st==='heavyKick'?7:4;
        applyHit(a,b,dmg,hs2,kb2);
        if(isLight(atk.st))SFX.lPunch();else if(atk.st==='heavyPunch')SFX.hPunch();else if(atk.st==='heavyKick')SFX.hKick();else if(isSpec)SFX.special();
        shake=isSpec?10:atk.st.includes('heavy')?7:4;hitFX(ab.x+ab.w/2,ab.y,!isLight(atk.st));
      }
      if(def.hp<=0){def.st='ko';def.stt=0;endRound(a);return}
    }
  }
  
  projs.forEach(pr=>{
    pr.x+=pr.vx;pr.life--;const def=P[1-pr.own];const hb=hurtBox(def);
    if(bOlap({x:pr.x-pr.sz/2,y:pr.y-pr.sz/2,w:pr.sz,h:pr.sz},hb)){
      if(def.st==='block'){def.bs=10;SFX.block();pr.life=0;const chip=Math.max(1,pr.dmg*.2|0);def.hp=Math.max(0,def.hp-chip)}
      else{applyHit(pr.own,1-pr.own,pr.dmg,12,5);SFX.lPunch();shake=4;pr.life=0;hitFX(pr.x,pr.y,false);if(def.hp<=0){def.st='ko';def.stt=0;endRound(pr.own)}}
    }
  });
  projs=projs.filter(p=>p.life>0&&p.x>-30&&p.x<W+30);
  
  for(let i=0;i<2;i++){const p=P[i];if(!p.gr&&!isAtk(p.st)&&p.st!=='ko'&&p.st!=='knockdown'&&p.hs<=0){
    p.vy+=.6*CHARS[p.ci].wt;p.y+=p.vy;p.x+=p.vx;
    if(p.y>=GY){p.y=GY;p.vy=0;p.vx=0;p.gr=true;if(!isAtk(p.st)){p.st='idle';p.stt=0}}
  }}
  
  updParts();
  const midX=(P[0].x+P[1].x)/2;camX=(midX-W/2)*.3;
  if(shake>0)shake*=.85;if(shake<.5)shake=0;
  for(let i=0;i<2;i++)if(combD[i].t>0)combD[i].t--;
};

// Patch matchEnd to accept touch
const origDrawMatchEnd=drawMatchEnd;
drawMatchEnd=function(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  const ch=CHARS[P[mw].ci];
  const grd=ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,250);
  grd.addColorStop(0,ch.col.acc+'44');grd.addColorStop(1,'#0a0a1a');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 32px monospace';ctx.fillStyle='#ffcc00';ctx.fillText(ch.name,W/2,60);
  ctx.font='bold 24px monospace';ctx.fillStyle='#fff';ctx.fillText('WINS!',W/2,90);
  const sprite=getSprite(P[mw].ci,'winPose',fc,'right');
  ctx.drawImage(sprite,W/2-SW,110,SW*2,SH*2);
  ctx.font='16px monospace';ctx.fillStyle='#aaa';ctx.fillText(`${P[0].wins} - ${P[1].wins}`,W/2,320);
  if(gMode==='cpu'){const dn=['EASY','MEDIUM','HARD'];ctx.font='12px monospace';ctx.fillStyle='#888';ctx.fillText(`VS CPU (${dn[cpuDiff]}) — ${mw===0?'PLAYER':'CPU'} WINS`,W/2,340)}
  const q=ch.quotes[(fc/300|0)%ch.quotes.length];
  ctx.font='13px monospace';ctx.fillStyle='#ffcc00';ctx.fillText(q,W/2,370);
  if(fc%70<45){ctx.font='16px monospace';ctx.fillStyle='#fff';ctx.fillText(isTouchDevice?'TAP TO REMATCH':'PRESS ENTER FOR REMATCH',W/2,420)}
  ctx.font='10px monospace';ctx.fillStyle='#666';ctx.fillText(isTouchDevice?'':'ESC FOR CHARACTER SELECT',W/2,445);
  ctx.textAlign='left';
  const g0=gpi(0),g1=gpi(1);
  if(ck('Enter')||touchJP.confirm||(g0&&g0.confirm)||(g1&&g1.confirm)){gs='vsScreen';vst=120;stopMusic();touchJP.confirm=false}
  if(ck('Escape')||touchJP.back||(g0&&g0.back)||(g1&&g1.back)){gs='charSelect';P[0].conf=P[1].conf=false;playMenuMusic();touchJP.back=false}
};

// Clear touch just-pressed flags each frame (after update)
const origUpdate=update;
update=function(){
  fc++;pollGP();
  switch(gs){
    case'title':updateTitle();break;
    case'charSelect':updateCharSelect();break;
    case'modeSelect':updateModeSelect();break;
    case'vsScreen':break;
    case'fight':updFight();break;
    case'matchEnd':{
      const g0=gpi(0),g1=gpi(1);
      if(ck('Enter')||ck('Space')||touchJP.confirm||(g0&&g0.confirm)||(g1&&g1.confirm)){gs='vsScreen';vst=120;stopMusic();touchJP.confirm=false}
      if(ck('Escape')||touchJP.back||(g0&&g0.back)||(g1&&g1.back)){gs='charSelect';P[0].conf=P[1].conf=false;playMenuMusic();touchJP.back=false}
      break;
    }
  }
  for(const k in jp2)jp2[k]=false;
  // Clear touch just-pressed
  for(const k in touchJP)touchJP[k]=false;
};

// Patch title draw to show tap hint on mobile
const origDrawTitle=drawTitle;
drawTitle=function(){
  origDrawTitle();
  if(isTouchDevice){
    ctx.textAlign='center';
    // Overwrite the PRESS ENTER text area
    ctx.fillStyle='#0a0a1a';ctx.fillRect(W/2-200,228,400,22);
    if(tb%70<45){ctx.font='bold 18px monospace';ctx.fillStyle='#fff';ctx.fillText('TAP TO START',W/2,240)}
    // Replace control hints
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,278,W,58);
    ctx.font='10px monospace';ctx.fillStyle='#444';
    ctx.fillText('D-Pad: Move | A: Punch | B: Kick | X: Special | Y: Block | S: Super',W/2,296);
    ctx.textAlign='left';
  }
};

loop();
